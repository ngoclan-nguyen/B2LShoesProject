spring.application.name=B2LShoes

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.location=uploads/
logging.level.com.example=DEBUG


spring.datasource.url=jdbc:mysql://localhost:3306/b2lshoes?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=webshoes
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

spring.devtools.restart.enabled=false