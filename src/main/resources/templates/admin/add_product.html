<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm mới - B2L Shoes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .text-b2l { color: #FF9900; }
        .bg-b2l { background-color: #FF9900; }
        /* Style cho checkbox/radio */
        input:checked + div { border-color: #FF9900; background-color: #fff7ed; }
        input:checked + div .check-icon { opacity: 1; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">
<div id="sidebar-overlay" onclick="toggleSidebar()"
     class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden transition-opacity opacity-0 lg:hidden"></div>

<aside id="sidebar"
       class="fixed inset-y-0 left-0 z-30 w-64 bg-black text-white transform -translate-x-full transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-auto flex flex-col">

    <div class="h-16 flex items-center justify-between px-6 border-b border-gray-800">
        <div class="flex items-center gap-2">
            <img src="/customer/images/logo-white.png" class="w-[30px] h-[30px]" alt="Logo">
            <span class="text-xl font-extrabold uppercase tracking-wider">B2L SHOES</span>
        </div>
        <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
    </div>

    <nav class="flex-1 py-6 space-y-1 overflow-y-auto">
        <a href="/admin/dashboard" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
            <i class="fa-solid fa-table-columns w-6 text-[#FF9900]"></i>
            <span class="font-bold">Tổng quan</span>
        </a>

        <a href="/admin/products" class="flex items-center px-6 py-3 bg-gray-900 border-l-4 border-[#FF9900] text-white group">
            <i class="fa-solid fa-box-open w-6 text-[#FF9900]"></i>
            <span class="font-medium">Sản phẩm</span>
        </a>

        <a href="/admin/orders" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
            <i class="fa-solid fa-bag-shopping w-6"></i>
            <span class="font-medium">Đơn hàng</span>
        </a>

        <a href="/admin/customers" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
            <i class="fa-solid fa-users w-6"></i>
            <span class="font-medium">Khách hàng</span>
        </a>
    </nav>

    <div class="p-4 border-t border-gray-800 bg-gray-900">
        <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-[#FF9900] font-bold">
                <i class="fa-regular fa-user"></i>
            </div>
            <div>
                <p class="text-sm font-bold text-white truncate w-32" th:text="${session.currentAdmin != null ? session.currentAdmin.name : 'Admin'}">Admin Name</p>
                <p class="text-xs text-gray-500">Quản trị viên</p>
            </div>
        </div>
        <a href="/admin/logout" class="block w-full text-center py-2 bg-[#FF9900] hover:bg-[#e68a00] text-white text-xs font-bold rounded transition">
            <i class="fa-solid fa-right-from-bracket mr-1"></i> Đăng xuất
        </a>
    </div>
</aside>

<div class="flex-1 flex flex-col overflow-hidden">

    <form action="/admin/product/save" method="POST" enctype="multipart/form-data" class="flex-1 flex flex-col h-full">

        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shadow-sm z-10 flex-shrink-0">
            <div class="flex items-center gap-3">
                <a href="/admin/products" class="text-gray-500 hover:text-black transition">
                    <i class="fa-solid fa-arrow-left text-xl"></i>
                </a>
                <h2 class="text-xl font-extrabold text-gray-800">Thêm sản phẩm mới</h2>
            </div>

            <div class="flex items-center gap-3">
                <a href="/admin/products" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-6 py-2 rounded font-bold transition shadow-sm">
                    Hủy
                </a>
                <button type="submit" class="bg-b2l hover:bg-orange-600 text-white px-6 py-2 rounded font-bold shadow transition flex items-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i> Lưu sản phẩm
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-8">

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">

                <div class="lg:col-span-2 space-y-6">

                    <div class="bg-white rounded-lg shadow-sm p-6">
                        <h3 class="font-bold text-lg text-black mb-4">Thông tin chung</h3>

                        <div class="mb-4">
                            <label class="block text-gray-600 font-semibold mb-2">Tên sản phẩm <span class="text-red-500">*</span></label>
                            <input type="text" name="name" required placeholder="Nhập tên sản phẩm..."
                                   class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-1 focus:ring-orange-500 transition">
                        </div>

                        <div>
                            <label class="block text-gray-600 font-semibold mb-2">Mô tả sản phẩm</label>
                            <textarea name="description" rows="5" placeholder="Mô tả chi tiết về chất liệu, kiểu dáng..."
                                      class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-1 focus:ring-orange-500 transition resize-none"></textarea>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow-sm p-6">
                        <h3 class="font-bold text-lg text-black mb-4">Giá bán</h3>

                        <div class="grid grid-cols-2 gap-6 mb-4">
                            <div>
                                <label class="block text-gray-600 font-semibold mb-2">Giá bán (VNĐ) <span class="text-red-500">*</span></label>
                                <input type="number" name="price" required placeholder="0"
                                       class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-1 focus:ring-orange-500 transition">
                            </div>
                            <div>
                                <label class="block text-gray-600 font-semibold mb-2">Giá khuyến mãi (Nếu có)</label>
                                <input type="number" name="salePrice" placeholder="0"
                                       class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-1 focus:ring-orange-500 transition">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="inline-flex items-center cursor-pointer select-none">
                                <input type="checkbox" id="hasVariants" class="w-4 h-4 text-orange-500 border-gray-300 rounded focus:ring-orange-500" onchange="toggleVariants()">
                                <span class="ml-2 text-gray-700 font-medium">Sản phẩm này có nhiều size / màu</span>
                            </label>
                        </div>

                        <div id="variantSection" class="hidden bg-gray-50 p-4 rounded border border-gray-200">
                            <table class="w-full text-left mb-3">
                                <thead>
                                <tr class="text-xs text-gray-500 uppercase">
                                    <th class="pb-2 w-1/3">Màu sắc</th>
                                    <th class="pb-2 w-1/3">Size</th>
                                    <th class="pb-2 w-1/3">Tồn kho</th>
                                    <th class="pb-2"></th>
                                </tr>
                                </thead>
                                <tbody id="variantTableBody">
                                <tr class="variant-row">
                                    <td class="pr-2 pb-2">
                                        <select name="variantColor[]" class="w-full border border-gray-300 rounded px-2 py-1.5 focus:outline-none">
                                            <option th:each="c : ${colors}" th:value="${c}" th:text="${c}"></option>
                                        </select>
                                    </td>
                                    <td class="pr-2 pb-2">
                                        <input type="text" name="variantSize[]" placeholder="VD: 40" class="w-full border border-gray-300 rounded px-2 py-1.5 focus:outline-none">
                                    </td>
                                    <td class="pr-2 pb-2">
                                        <input type="number" name="variantStock[]" placeholder="0" class="w-full border border-gray-300 rounded px-2 py-1.5 focus:outline-none">
                                    </td>
                                    <td class="pb-2 text-right">
                                        <button type="button" onclick="removeRow(this)" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                            <button type="button" onclick="addVariantRow()" class="text-sm font-bold text-b2l hover:underline">
                                + Thêm biến thể
                            </button>
                        </div>

                        <div id="simpleStock" class="mt-4">
                            <label class="block text-gray-600 font-semibold mb-2">Số lượng tồn kho</label>
                            <input type="number" name="quantity" placeholder="0"
                                   class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-1 focus:ring-orange-500 transition">
                        </div>
                    </div>
                </div>

                <div class="space-y-6">

                    <div class="bg-white rounded-lg shadow-sm p-6">
                        <h3 class="font-bold text-lg text-black mb-4 uppercase text-sm tracking-wide">Hình ảnh</h3>

                        <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 flex flex-col items-center justify-center text-center hover:bg-gray-50 transition cursor-pointer relative">
                            <input type="file" name="imageFile" accept="image/png, image/jpeg, image/jpg"
                                   class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                   onchange="previewImages(this)">
                            <i class="fa-regular fa-image text-3xl text-gray-400 mb-2"></i>
                            <span class="text-xs text-gray-500">Kéo thả ảnh hoặc click để tải ảnh</span>
                        </div>

                        <div id="imagePreview" class="grid grid-cols-3 gap-2 mt-4">
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow-sm p-6">
                        <h3 class="font-bold text-lg text-black mb-4 uppercase text-sm tracking-wide">Phân loại</h3>

                        <div class="mb-4">
                            <label class="block text-gray-600 font-semibold mb-2 text-xs uppercase">Thương hiệu</label>
                            <select name="brandId" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-orange-500 bg-white">
                                <option th:each="b : ${brands}"
                                        th:value="${b.id}"
                                        th:text="${b.name}"> </option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-gray-600 font-semibold mb-2 text-xs uppercase">Danh mục</label>
                            <div th:each="c : ${categories}" class="flex items-center gap-2 mb-2">
                                <input type="radio"
                                       name="categoryId"
                                       th:value="${c.id}"
                                       class="cursor-pointer">

                                <label th:text="${c.name}" class="text-sm text-gray-700"></label>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </main>
    </form>
</div>

<script th:inline="javascript">
    // 1. Ẩn/Hiện khu vực biến thể
    function toggleVariants() {
        const isChecked = document.getElementById('hasVariants').checked;
        const section = document.getElementById('variantSection');
        const simpleStock = document.getElementById('simpleStock');

        if (isChecked) {
            section.classList.remove('hidden');
            simpleStock.classList.add('hidden');
        } else {
            section.classList.add('hidden');
            simpleStock.classList.remove('hidden');
        }
    }

    // 2. Thêm dòng biến thể mới
    function addVariantRow() {
        const tbody = document.getElementById('variantTableBody');
        // Lấy danh sách màu từ biến Java đã đẩy xuống (Thymeleaf inline)
        /*[[${colors}]]*/
        const colors = ["Trắng", "Đen", "Đỏ", "Xanh", "Vàng"]; // Fallback nếu JS lỗi

        // Tạo options cho select màu
        // Lưu ý: Đây là JS thuần tạo HTML string cho nhanh
        // Trong thực tế nên cloneNode từ dòng đầu tiên
        const firstRow = tbody.querySelector('.variant-row');
        const newRow = firstRow.cloneNode(true);

        // Reset giá trị input trong dòng mới
        newRow.querySelectorAll('input').forEach(input => input.value = '');

        tbody.appendChild(newRow);
    }

    // 3. Xóa dòng biến thể
    function removeRow(btn) {
        const row = btn.closest('tr');
        const tbody = document.getElementById('variantTableBody');
        if (tbody.querySelectorAll('tr').length > 1) {
            row.remove();
        } else {
            alert("Phải có ít nhất một biến thể!");
        }
    }

    // 4. Preview ảnh khi chọn file
    function previewImages(input) {
        const container = document.getElementById('imagePreview');
        container.innerHTML = ''; // Xóa cũ

        if (input.files) {
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'w-full h-20 bg-gray-100 rounded overflow-hidden border border-gray-200 relative group';
                    div.innerHTML = `
                            <img src="${e.target.result}" class="w-full h-full object-cover">
                        `;
                    container.appendChild(div);
                }
                reader.readAsDataURL(file);
            });
        }
    }
</script>

</body>
</html>
