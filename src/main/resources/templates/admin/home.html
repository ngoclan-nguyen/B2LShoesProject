<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
	<link rel="stylesheet" th:href="@{/admin/css/tailwind.css}"/>
	<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <style>
        /* CSS riêng cho trang admin nếu cần */
        body { background-color: #f0f2f5; }
        .admin-header {
            background-color: #001529;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .admin-content {
            padding: 20px;
            max-width: 1000px;
            margin: 20px auto;
            background-color: white;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <h1>B2L Shoes - Trang Quản Trị (Admin)</h1>
    </header>

    <div class="admin-content">
        <h2>Chào mừng Admin!</h2>
        <p>Đây là khu vực quản trị của website.</p>
        
        <ul>
            <li>
                <a th:href="@{/admin/products}">Quản lý Sản phẩm</a>
            </li>
            <li>
                <a href="#">Quản lý Đơn hàng</a>
            </li>
            <li>
                <a href="#">Quản lý Người dùng</a>
            </li>
        </ul>
        
        <hr>
        
        <form th:action="@{/logout}" method="post">
            <button type="submit">Đăng xuất</button>
        </form>
    </div>

</body>
</html>
