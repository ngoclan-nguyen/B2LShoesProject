<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Voucher - B2L Shoes</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Montserrat', sans-serif; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .text-b2l { color: #FF9900; }
        .bg-b2l { background-color: #FF9900; }
        .transition-sidebar { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

<div id="sidebar-overlay" onclick="toggleSidebar()"
     class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden transition-opacity opacity-0 lg:hidden"></div>

<aside id="sidebar"
       class="fixed inset-y-0 left-0 z-30 w-64 bg-black text-white transform -translate-x-full transition-sidebar lg:translate-x-0 lg:static lg:inset-auto flex flex-col flex-shrink-0">

    <div class="h-16 flex items-center justify-between px-6 border-b border-gray-800">
        <div class="flex items-center gap-2">
            <img src="/customer/images/logo-white.png" class="w-8 h-8" alt="Logo">
            <span class="text-lg font-extrabold uppercase tracking-wider">B2L SHOES</span>
        </div>
        <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
    </div>

    <nav class="flex-1 py-4 space-y-1 overflow-y-auto">
        <a href="/admin/dashboard" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-[#FF9900] transition-all">
            <i class="fa-solid fa-table-columns w-6"></i>
            <span class="font-medium">Tổng quan</span>
        </a>
        <a href="/admin/products" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-[#FF9900] transition-all">
            <i class="fa-solid fa-box-open w-6"></i>
            <span class="font-medium">Sản phẩm</span>
        </a>
        <a href="/admin/orders" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-[#FF9900] transition-all">
            <i class="fa-solid fa-bag-shopping w-6"></i>
            <span class="font-medium">Đơn hàng</span>
        </a>
        <a href="/admin/vouchers" class="flex items-center px-6 py-3 bg-gray-900 border-l-4 border-[#FF9900] text-white">
            <i class="fa-solid fa-ticket w-6 text-[#FF9900]"></i>
            <span class="font-bold">Mã giảm giá</span>
        </a>
        <a href="/admin/customers" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-[#FF9900] transition-all">
            <i class="fa-solid fa-users w-6"></i>
            <span class="font-medium">Khách hàng</span>
        </a>
    </nav>

    <div class="p-4 border-t border-gray-800 bg-gray-900">
        <div class="flex items-center gap-3 mb-3">
            <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-[#FF9900]">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <div class="overflow-hidden">
                <p class="text-xs font-bold text-white truncate" th:text="${session.currentAdmin != null ? session.currentAdmin.name : 'Admin'}">Admin</p>
                <p class="text-[10px] text-gray-500">Quản trị viên</p>
            </div>
        </div>
        <a href="/admin/logout" class="block w-full text-center py-2 bg-[#FF9900] hover:bg-[#e68a00] text-white text-xs font-bold rounded transition">
            Đăng xuất
        </a>
    </div>
</aside>

<div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-4 lg:px-8 z-10 flex-shrink-0">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-600 focus:outline-none">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <h2 class="text-lg lg:text-xl font-bold text-gray-800">Hệ thống Voucher</h2>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
                <p class="text-xs text-gray-500" th:text="${#temporals.format(#temporals.createNow(), 'EEEE, dd/MM/yyyy')}"></p>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 lg:p-6">
        <div class="max-w-[1600px] mx-auto">

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

                <div class="lg:col-span-4 xl:col-span-3">
                    <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-200">
                        <div class="flex items-center justify-between mb-5">
                            <h3 class="text-lg font-bold text-gray-800"
                                th:text="${voucher.id == null ? '➕ Thêm Voucher' : '🛠️ Cập nhật #' + voucher.id}">
                            </h3>
                            <a th:if="${voucher.id != null}" th:href="@{/admin/vouchers}" class="text-blue-500 text-xs hover:underline">Làm mới</a>
                        </div>

                        <div th:if="${success}" class="bg-green-50 text-green-700 text-xs p-3 rounded-lg mb-4 border border-green-100" th:text="${success}"></div>
                        <div th:if="${error}" class="bg-red-50 text-red-700 text-xs p-3 rounded-lg mb-4 border border-red-100" th:text="${error}"></div>

                        <form th:action="@{/admin/vouchers/save}" method="post" class="space-y-4">
                            <input type="hidden" name="id" th:value="${voucher.id}">

                            <div>
                                <label class="block text-gray-500 font-semibold text-[11px] uppercase mb-1">Mã Code</label>
                                <input type="text" name="code" th:value="${voucher.code}" required
                                       class="w-full border border-gray-200 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-orange-500/20 focus:border-[#FF9900] outline-none transition uppercase font-bold">
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-gray-500 font-semibold text-[11px] uppercase mb-1">Giảm (đ)</label>
                                    <input type="number" name="discountAmount" th:value="${voucher.discountAmount}" required min="1000"
                                           class="w-full border border-gray-200 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-orange-500/20 focus:border-[#FF9900] outline-none">
                                </div>
                                <div>
                                    <label class="block text-gray-500 font-semibold text-[11px] uppercase mb-1">Số lượng</label>
                                    <input type="number" name="quantity" th:value="${voucher.quantity}" required min="1"
                                           class="w-full border border-gray-200 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-orange-500/20 focus:border-[#FF9900] outline-none">
                                </div>
                            </div>

                            <div>
                                <label class="block text-gray-500 font-semibold text-[11px] uppercase mb-1">Đơn tối thiểu (đ)</label>
                                <input type="number" name="minOrderAmount" th:value="${voucher.minOrderAmount}" required min="0"
                                       class="w-full border border-gray-200 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-orange-500/20 focus:border-[#FF9900] outline-none">
                            </div>

                            <div>
                                <label class="block text-gray-500 font-semibold text-[11px] uppercase mb-1">Hạn sử dụng</label>
                                <input type="datetime-local" name="expiryDate"
                                       th:value="${voucher.expiryDate != null ? #temporals.format(voucher.expiryDate, 'yyyy-MM-dd''T''HH:mm') : ''}" required
                                       class="w-full border border-gray-200 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-orange-500/20 focus:border-[#FF9900] outline-none">
                            </div>

                            <div class="flex items-center gap-2 py-2">
                                <input type="checkbox" id="isActive" name="isActive" th:checked="${voucher.isActive}"
                                       class="w-4 h-4 accent-[#FF9900] cursor-pointer">
                                <label for="isActive" class="text-gray-700 font-medium cursor-pointer">Kích hoạt ngay</label>
                            </div>

                            <button type="submit"
                                    class="w-full bg-b2l hover:bg-orange-600 text-white py-3 rounded-lg font-bold shadow-lg shadow-orange-500/30 transition-all flex items-center justify-center gap-2 uppercase tracking-wide">
                                <i class="fa-solid fa-save"></i>
                                <span th:text="${voucher.id == null ? 'Tạo mã ngay' : 'Xác nhận sửa'}"></span>
                            </button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-8 xl:col-span-9">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-100 bg-white flex items-center justify-between">
                            <h3 class="font-bold text-gray-800 italic">Danh sách Voucher</h3>
                            <span class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-500 uppercase font-bold" th:text="${vouchers.size() + ' Mã'}"></span>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                <tr class="bg-gray-50 text-[10px] uppercase text-gray-500 font-bold border-b border-gray-100">
                                    <th class="px-6 py-4">Mã Code</th>
                                    <th class="px-6 py-4">Giảm giá</th>
                                    <th class="px-6 py-4">Điều kiện</th>
                                    <th class="px-6 py-4 text-center">SL</th>
                                    <th class="px-6 py-4">Hết hạn</th>
                                    <th class="px-6 py-4">Trạng thái</th>
                                    <th class="px-6 py-4 text-right">Thao tác</th>
                                </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50">
                                <tr th:each="v : ${vouchers}" class="hover:bg-orange-50/30 transition-colors group">
                                    <td class="px-6 py-4">
                                        <span class="font-black text-black tracking-tighter uppercase text-sm" th:text="${v.code}"></span>
                                    </td>
                                    <td class="px-6 py-4 font-bold text-orange-600"
                                        th:text="${#numbers.formatDecimal(v.discountAmount, 0, 'POINT', 0, 'COMMA')} + 'đ'"></td>
                                    <td class="px-6 py-4 text-xs text-gray-500">
                                        Từ <span th:text="${#numbers.formatDecimal(v.minOrderAmount, 0, 'POINT', 0, 'COMMA')} + 'đ'"></span>
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <span class="font-medium" th:text="${v.quantity}"></span>
                                    </td>
                                    <td class="px-6 py-4 text-[11px] text-gray-400" th:text="${#temporals.format(v.expiryDate, 'dd/MM/yyyy HH:mm')}"></td>
                                    <td class="px-6 py-4">
                                            <span th:if="${v.isActive and v.quantity > 0 and v.expiryDate.isAfter(#temporals.createNow())}"
                                                  class="px-2 py-1 rounded-md text-[10px] font-bold bg-green-50 text-green-600 border border-green-100">
                                                Hoạt động
                                            </span>
                                        <span th:unless="${v.isActive and v.quantity > 0 and v.expiryDate.isAfter(#temporals.createNow())}"
                                              class="px-2 py-1 rounded-md text-[10px] font-bold bg-red-50 text-red-600 border border-red-100">
                                                Tạm dừng
                                            </span>
                                    </td>
                                    <td class="px-6 py-4 text-right space-x-2">
                                        <a th:href="@{/admin/vouchers/edit/{id}(id=${v.id})}"
                                           class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all">
                                            <i class="fa-solid fa-pen-to-square text-xs"></i>
                                        </a>
                                        <a th:href="@{/admin/vouchers/delete/{id}(id=${v.id})}"
                                           class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-all"
                                           onclick="return confirm('Bạn chắc chắn muốn xóa mã này?');">
                                            <i class="fa-solid fa-trash text-xs"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${vouchers == null || vouchers.empty}">
                                    <td colspan="7" class="text-center py-12 text-gray-400 italic">Hệ thống chưa có mã giảm giá nào...</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const isHidden = sidebar.classList.contains('-translate-x-full');

        if (isHidden) {
            sidebar.classList.remove('-translate-x-full');
            sidebar.classList.add('translate-x-0');
            overlay.classList.remove('hidden', 'opacity-0');
            overlay.classList.add('opacity-100');
        } else {
            sidebar.classList.add('-translate-x-full');
            sidebar.classList.remove('translate-x-0');
            overlay.classList.add('opacity-0');
            overlay.classList.remove('opacity-100');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }
    }
</script>

</body>
</html>
