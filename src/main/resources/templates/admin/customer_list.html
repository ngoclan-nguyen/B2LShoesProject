<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khách hàng - B2L Shoes</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Montserrat', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .text-b2l { color: #FF9900; }
        .bg-b2l { background-color: #FF9900; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

	<div id="sidebar-overlay" onclick="toggleSidebar()"
	     class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden transition-opacity opacity-0 lg:hidden"></div>

	<aside id="sidebar"
	       class="fixed inset-y-0 left-0 z-30 w-64 bg-black text-white transform -translate-x-full transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-auto flex flex-col">

	    <div class="h-16 flex items-center justify-between px-6 border-b border-gray-800">
	        <div class="flex items-center gap-2">
	            <img src="/customer/images/logo-white.png" class="w-[30px] h-[30px]" alt="Logo">
	            <span class="text-xl font-extrabold uppercase tracking-wider">B2L SHOES</span>
	        </div>
	        <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white">
	            <i class="fa-solid fa-xmark text-xl"></i>
	        </button>
	    </div>

		<nav class="flex-1 py-6 space-y-1 overflow-y-auto">
			<a href="/admin/dashboard" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
				<i class="fa-solid fa-table-columns w-6"></i>
				<span class="font-bold">Tổng quan</span>
			</a>

			<a href="/admin/products" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
				<i class="fa-solid fa-box-open w-6"></i>
				<span class="font-medium">Sản phẩm</span>
			</a>

			<a href="/admin/orders" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
				<i class="fa-solid fa-bag-shopping w-6"></i>
				<span class="font-medium">Đơn hàng</span>
			</a>

			<a href="/admin/vouchers" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
				<i class="fa-solid fa-ticket w-6"></i>
				<span class="font-medium">Mã giảm giá</span>
			</a>

	        <a href="/admin/customers" class="flex items-center px-6 py-3 bg-gray-900 border-l-4 border-[#FF9900] text-white group">
	            <i class="fa-solid fa-users w-6 text-[#FF9900]"></i>
	            <span class="font-medium">Khách hàng</span>
	        </a>
	    </nav>

	    <div class="p-4 border-t border-gray-800 bg-gray-900">
	        <div class="flex items-center gap-3 mb-3">
	            <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-[#FF9900] font-bold">
	                <i class="fa-regular fa-user"></i>
	            </div>
	            <div>
	                <p class="text-sm font-bold text-white truncate w-32" th:text="${session.currentAdmin != null ? session.currentAdmin.name : 'Admin'}">Admin Name</p>
	                <p class="text-xs text-gray-500">Quản trị viên</p>
	            </div>
	        </div>
	        <a href="/admin/logout" class="block w-full text-center py-2 bg-[#FF9900] hover:bg-[#e68a00] text-white text-xs font-bold rounded transition">
	            <i class="fa-solid fa-right-from-bracket mr-1"></i> Đăng xuất
	        </a>
	    </div>
	</aside>

	<div class="flex-1 flex flex-col overflow-hidden w-full">
		<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-8 shadow-sm z-10 flex-shrink-0">
	        <div class="flex items-center gap-3">
	            <button onclick="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-black focus:outline-none">
	                <i class="fa-solid fa-bars text-2xl"></i>
	            </button>
	            <h2 class="text-lg lg:text-xl font-extrabold text-gray-800 truncate">DANH SÁCH KHÁCH HÀNG</h2>
	        </div>
			<p class="ml-auto inline text-base">Số lượng: 
				<span id="totalCustomer" class="text-[#FF9900] font-bold"
				th:text="${#lists.size(customers)}">12</span>
			</p>
	    </header>
			
		<main class="flex-1 overflow-y-auto p-4 md:p-10">
			<div class="flex flex-col mx-auto gap-10 text-base px-4 lg:px-0">
				<div th:each="customer : ${customers}"
				     class="group flex flex-col lg:flex-row w-full lg:w-[85%] mx-auto bg-white rounded-xl border border-gray-200 shadow hover:shadow-lg transition-all duration-200 p-4 lg:p-6 cursor-pointer"
				     title="Xem chi tiết"
				     th:onclick="|window.location.href='/admin/customer/${customer.id}'|">

				    <div class="flex flex-col lg:flex-row flex-1 gap-4 lg:gap-10">
						<div class="space-y-2 flex-1">
							<p class="text-xl font-bold text-gray-800 group-hover:text-[#FF9900] transition">
					            <i class="fa-regular fa-user mr-2 text-gray-400"></i>
					            <span th:text="${customer.name}">Tên khách hàng</span>
					        </p>
							<p class="text-sm">
					            <span class="text-gray-500">Giới tính:</span>
					            <span th:text="${customer.gender == '1' ? 'Nam' : 'Nữ'}"
					                  th:classappend="${customer.gender == '1' ? 'text-blue-600' : 'text-pink-600'}"
					                  class="font-semibold ml-1">
					            </span>
					        </p>
					        <p class="text-sm text-gray-600">
					            <i class="fa-solid fa-phone mr-2 text-gray-400"></i>
					            <span th:text="${customer.phone}">0123456789</span>
					        </p>
					        <p class="text-sm text-gray-600 truncate">
					            <i class="fa-solid fa-envelope mr-2 text-gray-400"></i>
					            <span th:text="${customer.email}">email@gmail.com</span>
					        </p>
						</div>
						<div class="flex items-center lg:justify-start gap-2 mt-2 lg:mt-0 lg:w-[30%]">
						    <span class="text-gray-500 mr-2">Hạng:</span>

						    <span th:text="${customer.title}"
						          class="px-3 py-1 rounded-full text-sm font-semibold
						                 bg-yellow-100 text-yellow-700
						                 border border-yellow-300
						                 shadow-sm">
						        Kim cương
						    </span>
						</div>
				    </div>

				    <!-- Hành động -->
				    <div class="flex items-center justify-end lg:justify-center pt-3 lg:pt-0 lg:pl-6 lg:border-l">
				        <button th:onclick="'event.stopPropagation(); deleteCustomer(' + ${customer.id} + ')'"
				                class="text-[#FF9900] hover:text-red-600 text-xl transition"
				                title="Xóa khách hàng">
				            <i class="fa-solid fa-trash"></i>
				        </button>
				    </div>
				</div>
			</div>
		</main>
	</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/admin/js/common.js"></script>
<script>
	function deleteCustomer(id) {
	    Swal.fire({
	        title: 'Xác nhận xóa?',
	        text: 'Khách hàng sẽ bị xóa khỏi hệ thống',
	        icon: 'warning',
	        showCancelButton: true,
	        confirmButtonText: 'Xóa',
	        cancelButtonText: 'Hủy',
	        confirmButtonColor: '#FF9900',
	        cancelButtonColor: '#6B7280'
	    }).then((result) => {

	        if (!result.isConfirmed) return;

	        $.ajax({
	            url: `/admin/delete/customer/${id}`,
	            type: 'POST',
	            success: function (res) {

	                if (res.success) {
	                    Swal.fire({
	                        icon: 'success',
	                        title: res.message,
	                        toast: true,
	                        position: 'top-end',
	                        showConfirmButton: false,
	                        timer: 2000
	                    });

	                    $(`[onclick*="deleteCustomer(${id})"]`)
	                        .closest('.group')
	                        .fadeOut(300, function () {
	                            $(this).remove();
	                        });

	                    if (res.remainingUsers !== undefined) {
	                        $('#totalCustomer').text(res.remainingUsers);
	                    }

	                } else {
	                    Swal.fire({
	                        icon: 'error',
	                        title: res.message
	                    });
	                }
	            },
	            error: function () {
	                Swal.fire({
	                    icon: 'error',
	                    title: 'Lỗi server'
	                });
	            }
	        });
	    });
	}
</script>

</body>
</html>
