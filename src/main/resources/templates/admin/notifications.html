<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tất cả Thông báo - B2L Shoes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/admin/js/common.js"></script>
    <script src="/admin/js/notifications.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .text-b2l { color: #FF9900; }
        .bg-b2l { background-color: #FF9900; }
        .notification-unread { background-color: #fffbeb; } /* Màu nền cho thông báo chưa đọc */
        .notification-unread:hover { background-color: #fef3c7; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

<div id="sidebar-overlay" onclick="toggleSidebar()"
     class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden transition-opacity opacity-0 lg:hidden"></div>

<aside id="sidebar"
       class="fixed inset-y-0 left-0 z-30 w-64 bg-black text-white transform -translate-x-full transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-auto flex flex-col">

    <div class="h-16 flex items-center justify-between px-6 border-b border-gray-800">
        <a href="/" class="flex items-center gap-2">
            <img src="/customer/images/logo-white.png" class="w-[30px] h-[30px]" alt="Logo">
            <span class="text-xl font-extrabold uppercase tracking-wider">B2L SHOES</span>
        </a>
        <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
    </div>

    <nav class="flex-1 py-6 space-y-1 overflow-y-auto">
        <a href="/admin/dashboard" class="flex items-center px-6 py-3 bg-gray-900 border-l-4 border-[#FF9900] text-white group">
            <i class="fa-solid fa-table-columns w-6 text-[#FF9900]"></i>
            <span class="font-bold">Tổng quan</span>
        </a>

        <a href="/admin/products" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
            <i class="fa-solid fa-box-open w-6"></i>
            <span class="font-medium">Sản phẩm</span>
        </a>

        <a href="/admin/orders" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
            <i class="fa-solid fa-bag-shopping w-6"></i>
            <span class="font-medium">Đơn hàng</span>
        </a>

        <a href="/admin/vouchers" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
            <i class="fa-solid fa-ticket w-6"></i>
            <span class="font-medium">Mã giảm giá</span>
        </a>

        <a href="/admin/customers" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-900 hover:text-white border-l-4 border-transparent hover:border-gray-600 transition-all">
            <i class="fa-solid fa-users w-6"></i>
            <span class="font-medium">Khách hàng</span>
        </a>
    </nav>

    <div class="p-4 border-t border-gray-800 bg-gray-900">
        <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-[#FF9900] font-bold">
                <i class="fa-regular fa-user"></i>
            </div>
            <div>
                <p class="text-sm font-bold text-white truncate w-32" th:text="${session.currentAdmin != null ? session.currentAdmin.name : 'Admin'}">Admin Name</p>
                <p class="text-xs text-gray-500">Quản trị viên</p>
            </div>
        </div>
        <a href="/admin/logout" class="block w-full text-center py-2 bg-[#FF9900] hover:bg-[#e68a00] text-white text-xs font-bold rounded transition">
            <i class="fa-solid fa-right-from-bracket mr-1"></i> Đăng xuất
        </a>
    </div>
</aside>
<div class="flex-1 flex flex-col overflow-hidden w-full">

    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10 flex-shrink-0">
        <h2 class="text-xl font-black text-gray-800">TẤT CẢ THÔNG BÁO</h2>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-4 lg:p-8">
        <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md border border-gray-200 overflow-hidden">

            <div class="px-6 py-4 border-b border-gray-100 bg-gray-50">
                <h3 class="font-bold text-gray-800">Lịch sử thông báo hệ thống</h3>
            </div>

            <div class="divide-y divide-gray-100">

                <a th:each="n : ${notifications}"

                   href="javascript:void(0);"

                   th:classappend="${!n.isRead} ? 'notification-unread'"
                   class="flex items-start p-4 transition duration-150 hover:bg-gray-50 notification-link"

                   th:data-url="${n.url}"
                   th:data-id="${n.id}"

                >

                    <div th:classappend="${!n.isRead} ? 'text-b2l' : 'text-gray-400'"
                         class="flex-shrink-0 mr-4 mt-1">
                        <i th:classappend="${n.type == 'ORDER' ? 'fa-solid fa-cart-shopping' :
                             (n.type == 'STOCK' ? 'fa-solid fa-boxes-stacked' :
                             'fa-regular fa-bell')}"
                           class="text-xl"></i>
                    </div>

                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center mb-1">
                            <p th:classappend="${!n.isRead} ? 'font-black' : 'font-semibold'"
                               class="text-gray-800 text-sm truncate" th:text="${n.title}">
                                Tiêu đề thông báo
                            </p>
                            <span class="text-[10px] text-gray-400 font-medium flex-shrink-0"
                                  th:text="${#temporals.format(n.createdAt, 'HH:mm dd/MM/yyyy')}">
                10:30 15/12/2025
            </span>
                        </div>
                        <p class="text-xs text-gray-600 line-clamp-2" th:text="${n.message}">
                            Nội dung chi tiết của thông báo.
                        </p>
                    </div>
                </a>

                <div th:if="${notifications.empty}">
                    <p class="p-8 text-center text-gray-500">Không có thông báo nào trong hệ thống.</p>
                </div>

            </div>

            <div class="p-4 border-t text-right">
                <button onclick="markAllAsRead()" class="text-xs font-bold text-gray-500 hover:text-b2l">Đánh dấu tất cả đã đọc</button>
            </div>

        </div>
    </main>
</div>

</body>
</html>
