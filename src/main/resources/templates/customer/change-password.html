<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi mật khẩu - B2L Shoes</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-800 flex flex-col min-h-screen">

<header th:replace="~{customer/fragments/header}"></header>

<div class="bg-gray-50">
    <div class="container mx-auto px-4 py-3 text-sm text-gray-500">
        <a href="/" class="text-gray-900 hover:underline hover:text-black transition">Trang chủ</a>
        <span class="mx-3 text-gray-400">/</span>
        <span class="text-black font-bold border-b border-black">Tài khoản</span>
    </div>
</div>

<section class="container mx-auto px-4 py-10 flex-grow">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">

        <aside class="md:col-span-1">
            <div class="bg-gray-50 rounded-xl p-6 border border-gray-100 shadow-sm sticky top-24">

                <div class="flex items-center gap-4 mb-8 pb-6 border-b border-gray-200">
                    <div class="w-14 h-14 bg-gray-200 rounded-full flex items-center justify-center text-xl font-bold text-gray-500 border-2 border-white shadow-md">
                        <span th:text="${#strings.substring(session.currentCustomer.name, 0, 1).toUpperCase()}">U</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-500">Xin chào,</p>
                        <h3 class="font-bold text-gray-800 truncate" th:text="${session.currentCustomer.name}">User Name</h3>
                    </div>
                </div>

                <nav class="space-y-1">
                    <a href="/profile" class="flex items-center gap-3 px-4 py-3 bg-white text-[#FF9900] font-bold rounded-lg shadow-sm border border-gray-100">
                        <i class="fa-regular fa-user w-5 text-center"></i> Thông tin tài khoản
                    </a>

                    <a href="/my-orders" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-white hover:text-black hover:font-bold hover:shadow-sm rounded-lg transition-all">
                        <i class="fa-solid fa-box-open w-5 text-center"></i> Quản lý đơn hàng
                    </a>

                    <a href="/my-addresses" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-white hover:text-black hover:font-bold hover:shadow-sm rounded-lg transition-all">
                        <i class="fa-solid fa-map-location-dot w-5 text-center"></i> Danh sách địa chỉ
                    </a>

                    <a href="/logout" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 font-medium rounded-lg transition-all mt-4 border-t border-transparent hover:border-red-100">
                        <i class="fa-solid fa-right-from-bracket w-5 text-center"></i> Đăng xuất
                    </a>
                </nav>
            </div>
        </aside>

        <div class="md:col-span-3">
            <div class="bg-white">
                <h2 class="text-2xl font-bold uppercase mb-2 flex items-center gap-3">
                    Đổi mật khẩu
                </h2>
                <p class="text-sm text-gray-500 mb-8">Để bảo mật tài khoản, vui lòng không chia sẻ mật khẩu cho người khác.</p>

                <form th:action="@{/change-password-process}" method="post" class="max-w-xl" onsubmit="return validateForm(event)">

                    <div class="mb-6 relative group">
                        <label class="font-bold text-gray-600 block mb-2 text-sm">Mật khẩu hiện tại *</label>
                        <input type="password" id="oldPassword" name="oldPassword" required placeholder="Nhập mật khẩu hiện tại"
                               class="w-full p-3 border border-gray-200 rounded focus:outline-none focus:border-[#FF9900] focus:ring-1 focus:ring-[#FF9900] transition-colors pr-10">
                        <span onclick="togglePass('oldPassword', this)" class="absolute right-3 top-9 cursor-pointer text-gray-400 hover:text-black">
                                <i class="fa-regular fa-eye"></i>
                            </span>
                    </div>

                    <hr class="border-gray-100 my-6">

                    <div class="mb-4 relative group">
                        <label class="font-bold text-gray-600 block mb-2 text-sm">Mật khẩu mới *</label>
                        <input type="password" id="newPassword" name="newPassword" required placeholder="Nhập mật khẩu mới"
                               class="w-full p-3 border border-gray-200 rounded focus:outline-none focus:border-[#FF9900] focus:ring-1 focus:ring-[#FF9900] transition-colors pr-10"
                               oninput="checkStrength()">

                        <span onclick="togglePass('newPassword', this)" class="absolute right-3 top-9 cursor-pointer text-gray-400 hover:text-black">
                                <i class="fa-regular fa-eye"></i>
                            </span>

                        <div id="strengthContainer" class="hidden mt-2 transition-all duration-300">
                            <div class="w-full bg-gray-100 rounded-full h-1">
                                <div id="strengthBar" class="h-full w-0 transition-all duration-500 rounded-full bg-red-500"></div>
                            </div>
                        </div>
                        <p class="text-[11px] text-gray-400 mt-1 italic pl-1">
                            * Tối thiểu 8 ký tự, bao gồm chữ và số.
                        </p>
                    </div>

                    <div class="mb-8 relative group">
                        <label class="font-bold text-gray-600 block mb-2 text-sm">Xác nhận mật khẩu mới *</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Nhập lại mật khẩu mới"
                               class="w-full p-3 border border-gray-200 rounded focus:outline-none focus:border-[#FF9900] focus:ring-1 focus:ring-[#FF9900] transition-colors pr-10"
                               oninput="checkMatch()">

                        <span onclick="togglePass('confirmPassword', this)" class="absolute right-3 top-9 cursor-pointer text-gray-400 hover:text-black">
                                <i class="fa-regular fa-eye"></i>
                            </span>

                        <p id="matchError" class="text-xs text-red-500 mt-1 hidden font-bold">
                            <i class="fa-solid fa-circle-exclamation"></i> Mật khẩu không khớp
                        </p>
                    </div>

                    <div class="flex gap-4">
                        <button type="submit"
                                class="px-8 py-3 bg-[#FF9900] text-white font-bold uppercase rounded shadow-md hover:bg-[#e68a00] hover:shadow-lg transition-all transform active:scale-95 flex items-center gap-2">
                            <i class="fa-solid fa-check"></i> Lưu thay đổi
                        </button>

                        <a href="/profile" class="px-6 py-3 text-gray-500 hover:text-black font-bold uppercase transition flex items-center">
                            Hủy bỏ
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{customer/fragments/footer}"></footer>

<script th:inline="javascript">
    /*<![CDATA[*/
    var alertMsg = /*[[${alert}]]*/ null;
    var successMsg = /*[[${success}]]*/ null;

    if(alertMsg) {
        Swal.fire({ title: 'Thất bại', text: alertMsg, icon: 'error', confirmButtonColor: '#FF9900' });
    }
    if(successMsg) {
        Swal.fire({ title: 'Thành công!', text: successMsg, icon: 'success', confirmButtonColor: '#FF9900' });
    }

    // Logic check pass (MỚI: 8 ký tự + Chữ + Số)
    function checkStrength() {
        const password = document.getElementById('newPassword').value;
        const container = document.getElementById('strengthContainer');
        const bar = document.getElementById('strengthBar');

        if (password.length === 0) {
            container.classList.add('hidden');
            return;
        } else {
            container.classList.remove('hidden');
        }

        // Điều kiện: Dài >= 8, có chữ, có số
        const hasLen = password.length >= 8;
        const hasLetter = /[a-zA-Z]/.test(password);
        const hasNum = /[0-9]/.test(password);

        if (!hasLen) {
            // Yếu (Chưa đủ dài)
            bar.style.width = '30%';
            bar.className = 'h-full rounded-full bg-red-500 transition-all duration-500';
        } else if (!hasLetter || !hasNum) {
            // Trung bình (Đủ dài nhưng thiếu chữ hoặc số)
            bar.style.width = '60%';
            bar.className = 'h-full rounded-full bg-yellow-400 transition-all duration-500';
        } else {
            // Mạnh (Đủ hết)
            bar.style.width = '100%';
            bar.className = 'h-full rounded-full bg-green-500 transition-all duration-500';
        }
        checkMatch();
    }

    function checkMatch() {
        const p1 = document.getElementById('newPassword').value;
        const p2 = document.getElementById('confirmPassword').value;
        const err = document.getElementById('matchError');
        if (p1 !== p2 && p2 !== '') { err.classList.remove('hidden'); }
        else { err.classList.add('hidden'); }
    }

    function validateForm(event) {
        const oldPass = document.getElementById('oldPassword').value;
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        let errorMsg = "";

        // CHECK VALIDATE KỸ HƠN
        if (newPass.length < 8) {
            errorMsg = "Mật khẩu mới phải có ít nhất 8 ký tự!";
        }
        else if (!/[a-zA-Z]/.test(newPass) || !/[0-9]/.test(newPass)) {
            errorMsg = "Mật khẩu mới phải bao gồm cả CHỮ và SỐ!";
        }
        else if (newPass !== confirmPass) {
            errorMsg = "Mật khẩu xác nhận không khớp!";
        }
        else if (oldPass === newPass) {
            errorMsg = "Mật khẩu mới không được trùng với mật khẩu cũ!";
        }

        if (errorMsg) {
            event.preventDefault();
            Swal.fire({ title: 'Lỗi', text: errorMsg, icon: 'warning', confirmButtonColor: '#FF9900' });
            return false;
        }
        return true;
    }

    function togglePass(id, iconSpan) {
        const input = document.getElementById(id);
        const icon = iconSpan.querySelector('i');
        if (input.type === "password") { input.type = "text"; icon.className = "fa-regular fa-eye-slash"; }
        else { input.type = "password"; icon.className = "fa-regular fa-eye"; }
    }
    /*]]>*/
</script>

</body>
</html>
