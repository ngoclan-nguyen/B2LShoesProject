<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cửa hàng - B2L Shoes</title>
    </head>
<body>
    <header th:replace="~{customer/fragments/header}"></header>

    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold uppercase mb-6" th:text="${pageTitle}">Sản phẩm</h1>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div th:each="product : ${products}" class="group cursor-pointer border p-2">
                <div class="relative aspect-square bg-[#f5f5f5] mb-3">
                    <img th:src="@{${product.image}}" class="w-full h-full object-contain">
                </div>
                <div>
                    <h3 class="font-bold text-sm" th:text="${product.name}">Tên giày</h3>
                    <p class="text-red-600 font-bold" 
                       th:text="${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')} + '₫'">Giá</p>
                </div>
            </div>
        </div>

        <div th:if="${products.isEmpty()}" class="text-center py-10 text-gray-500">
            Không tìm thấy sản phẩm nào.
        </div>
    </div>

    <footer th:replace="~{customer/fragments/footer}"></footer>
</body>
</html>
