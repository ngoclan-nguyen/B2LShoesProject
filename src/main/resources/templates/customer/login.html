<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - B2L Shoes</title>

    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; }

    </style>
</head>
<body class="bg-white text-black">

<header th:replace="~{customer/fragments/header}"></header>

<section class="container mx-auto px-4 mt-8 mb-12 md:mt-16 md:mb-24">

    <div class="w-full max-w-[600px] mx-auto">

        <h1 class="text-2xl md:text-3xl font-extrabold uppercase mb-4 tracking-tight text-center md:text-left">
            CHÀO MỪNG BẠN TRỞ LẠI
        </h1>

        <p class="text-gray-500 mb-6 md:mb-8 text-sm leading-relaxed text-center md:text-left">
            Đăng nhập vào tài khoản hiện tại của bạn để truy cập các đặc quyền dành cho thành viên.
        </p>

        <form th:action="@{/login}" method="post" class="flex flex-col w-full">

            <input type="email" name="username" id="email" required
                   placeholder="Email *"
                   class="w-full p-3 md:p-4 border border-gray-300 rounded mb-4 focus:outline-none focus:border-black focus:ring-0 transition-colors placeholder-gray-400 text-base md:text-sm font-medium">

            <input type="password" name="password" id="password" required
                   placeholder="Mật khẩu *"
                   class="w-full p-3 md:p-4 border border-gray-300 rounded mb-6 focus:outline-none focus:border-black focus:ring-0 transition-colors placeholder-gray-400 text-base md:text-sm font-medium">

            <button type="submit"
                    class="w-full py-3 md:py-4 bg-[#FF9900] text-white font-bold text-base md:text-lg uppercase rounded shadow-md hover:bg-[#e68a00] hover:shadow-lg transition-all duration-300 active:scale-95">
                Đăng nhập
            </button>

            <div class="flex flex-col md:flex-row justify-between items-center mt-6 text-sm font-medium text-gray-600 gap-4 md:gap-0">
                <div>
                    <span>Thành viên mới? </span>
                    <a href="/customer/register" class="underline hover:text-black decoration-1 underline-offset-2">Tạo tài khoản</a>
                </div>

                <a href="/forgot-password" class="underline hover:text-black decoration-1 underline-offset-2">Quên mật khẩu ?</a>
            </div>

        </form>
    </div>
</section>

<footer th:replace="~{customer/fragments/footer}"></footer>

</body>
</html>
