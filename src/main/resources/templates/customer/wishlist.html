<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
	<head>
	    <meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	    <link rel="icon" type="image/png" th:href="@{/customer/images/logo.png}">
	    <title>B2L Shoes - Danh sách yêu thích</title>

	    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
	    <script src="https://cdn.tailwindcss.com"></script>
	    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
	    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	    <style>
	        * { box-sizing: border-box; }
	        body { font-family: 'Montserrat', sans-serif; }
	
	        /* Hiệu ứng trồi lên (Scroll Reveal) */
	        .reveal {
	            opacity: 0;
	            transform: translateY(30px);
	            transition: all 0.8s ease-out;
	        }
	        .reveal.active {
	            opacity: 1;
	            transform: translateY(0);
	        }
	
	        /* Ẩn thanh cuộn nhưng vẫn trượt được */
	        .hide-scrollbar::-webkit-scrollbar { display: none; }
	        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
			
			.quantityDisplay::-webkit-outer-spin-button,
			.quantityDisplay::-webkit-inner-spin-button {
			    -webkit-appearance: none;
			    margin: 0;
			}

			/* Firefox */
			.quantityDisplay[type=number] {
			    -moz-appearance: textfield;
			}
	    </style>
	</head>
	<body class="bg-white text-black">
		<div th:replace="~{customer/fragments/header :: header}"></div>
		    <!-- Content -->
		<div class="px-20 py-10">
			<h2 class="font-bold text-3xl text-left pb-5">SẢN PHẨM YÊU THÍCH</h2>
			<p>
			    <span id="wishlistCount" th:text="${userWishlist != null} ? ${userWishlist.size()} : 0">2</span> sản phẩm
			</p>
		</div>
	    <div class="container mx-auto px-4 sm:px-6 lg:px-8 my-10 min-h-[500px]">
	        <div class="flex flex-col">  
	            <div th:if="${userWishlist == null || userWishlist.isEmpty()}" class="text-center py-20 shadow-lg">
	                <h2 class="text-2xl text-gray-500 font-bold mb-4">Danh sách yêu thích của bạn đang trống!</h2>
	                <p class="text-gray-500 mb-8">Hãy thêm những sản phẩm bạn yêu thích vào đây để mua sau.</p>
	                <a th:href="@{/}" class="bg-[#FF9900] text-white px-8 py-3 rounded-[15px] font-bold hover:bg-orange-600 hover:shadow-lg transition-all duration-300 cursor-pointer">
	                    Quay lại mua sắm
	                </a>
	            </div>

				<div th:unless="${userWishlist == null || userWishlist.isEmpty()}" 
					class="grid grid-cols-3 gap-10">
					<div th:each="product : ${userWishlist}" 
					     th:id="'wishlistItem-' + ${product.productId}"
					     class="wishlistItem flex flex-col items-center gap-3 bg-white border border-[#00000088] items-center mx-auto py-8 mb-10 transition-transform hover:scale-[1.01] cursor-pointer">
					    <div class="w-[85%] flex flex-col justify-start gap-1">
							<img th:src="${product.productImagePath}" 
								alt="Product Image"
								class="w-full aspect-square border border-gray-300">
					        <p class="text-xl font-bold text-black line-clamp-2 mt-3">
					           <span th:text="${product.productName}">Tên sản phẩm</span>
					        </p>
					        <p class="text-sm text-gray-500" 
					        	th:text="${product.productDescription}">Mô tả		      
					        </p>
							<p class="text-xl font-bold text-red-600"
								th:text="${#numbers.formatInteger(product.productPrice,3,'POINT')} + 'đ'">Giá
							</p>
					    </div>
						<div class="w-[85%] flex justify-start">
							<button type="button"
							        class="addToCartBtn flex items-center gap-4 bg-[#FF9900] text-white h-14 py-[10px] px-4 mt-8 rounded-lg hover:bg-orange-600 hover:shadow-lg transition-all duration-300"
							        th:data-id="${product.productId}"
							        th:data-name="${product.productName}"
							        th:data-image="${product.productImagePath}"
							        th:data-description="${product.productDescription}"
							        th:data-price="${product.productPrice}">
							    <img th:src="@{/customer/images/white_cart.png}" class="w-8 h-8">
							    <p class="text-lg font-bold">Thêm vào giỏ hàng</p>
							</button>
							<button type="button"
						           class="removeWishlistBtn flex items-center justify-center h-14 mt-8 ml-auto transition-transform hover:scale-[1.2]"
						           th:attr="data-id=${product.productId}">
						       <img th:src="@{/customer/images/bin.png}" alt="Bin image" class="w-6 h-auto">
						   </button>
						</div>
					</div>
				</div>
	        </div>
		</div>
		<!-- Popup thêm vào giỏ hàng -->
		<div id="cartPopup" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
		    <div class="bg-white rounded-lg p-6 w-[600px] max-w-full relative">
		        <button id="closeCartPopup" class="absolute top-2 right-2 text-gray-500 hover:text-black text-4xl hover:font-bold">&times;</button>
		        <div class="flex flex-col gap-8">
		            <div class="flex gap-8">
		                <img id="popupImage" class="w-60 h-60 object-cover border border-gray-300" src="" alt="Product Image">
		                <div class="flex flex-col items-start gap-4">
		                    <a id="popupName" class="text-xl font-bold mb-2 hover:text-red-600 transition" href=""></a>
		                    <p id="popupPrice" class="text-red-600 font-bold text-xl mb-2"></p>
		                    <div class="mb-2">
		                        <label class="mr-4">Size:</label>
		                        <select id="popupSize" class="border border-gray-300 rounded px-2 py-1"></select>
		                    </div>
		                    <div class="flex items-center gap-4">
		                        <p>Số lượng: </p>
		                        <div class="popupQuantity flex items-center ml-auto">
		                            <button class="quantityMinus flex items-center justify-center border border-gray-300 border-r-0 rounded-l text-2xl w-8 h-8 hover:bg-black hover:text-white">-</button>
		                            <input id="popupQty" class="quantityDisplay flex items-center justify-center border border-gray-300 w-8 h-8 text-center" type="number" value="1" min="1">
		                            <button class="quantityPlus flex items-center justify-center border border-gray-300 border-l-0 rounded-r text-2xl w-8 h-8 hover:bg-black hover:text-white">+</button>
		                        </div>
		                    </div>
		                </div>
		            </div>
		            <div class="flex gap-2 mx-auto">
		                <button id="popupAddToCart" class="bg-[#FF9900] text-white px-4 py-2 rounded font-bold hover:bg-orange-600">Thêm vào giỏ hàng</button>
		                <button id="popupCancel" class="bg-white text-black px-4 py-2 rounded font-bold border border-black hover:bg-black hover:text-white">Hủy</button>
		            </div>
		        </div>
		    </div>
		</div>
		
		<div th:replace="~{customer/fragments/footer :: footer}"></div>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
		<script>
			$(function() {
					
				$(document).on('click', '.wishlistItem', function(e) {
				    // Nếu click vào nút xóa thì bỏ qua
				    if ($(e.target).closest('.removeWishlistBtn').length) return;
					if ($(e.target).closest('.addToCartBtn').length) return;
					
					console.log($(this).attr('id'));

				    const productId = $(this).attr('id').replace('wishlistItem-', '');
				    window.location.href = `/product/${productId}`;
				});

			    $(document).on('click', '.removeWishlistBtn', function(e) {
					e.preventDefault();
					e.stopPropagation();
			        const productId = $(this).data('id'); 
			        const wishlistDiv = $(this).closest('.wishlistItem');

			        $.ajax({
			            url: '/api/wishlist/remove',
			            type: 'POST',
			            headers: {},
			            data: { productId: productId },
			            success: function(res) {
			                wishlistDiv.remove(); // remove ngay trên trang
			                // cập nhật số lượng sản phẩm
							const countEl = $('#wishlistCount');
							if(countEl.length) {
							    let count = parseInt(countEl.text()) - 1;
							    countEl.text(count);

							    // Nếu sau khi trừ = 0 → reload trang
							    if(count === 0) {
							        location.reload();
							    }
							}
			            },
			            error: function(xhr, status, error) {
			                alert("Xóa thất bại!");
			                console.error("Xóa thất bại:", error);
			            }
			        });
			    });
				
				let currentProductId = null; // lưu productId đang thao tác

				// Click nút Thêm vào giỏ hàng
				$(document).on('click', '.addToCartBtn', function(e) {
			        e.stopPropagation();
			        currentProductId = $(this).data('id');
			        const productName = $(this).data('name');
			        const productImage = $(this).data('image');
			        const productPrice = $(this).data('price');

			        // Điền dữ liệu vào popup
			        $('#popupImage').attr('src', productImage);
			        $('#popupName').attr('href', '/product/' + currentProductId);
			        $('#popupName').text(productName);
			        $('#popupPrice').text(new Intl.NumberFormat('vi-VN').format(productPrice) + 'đ');

			        $('#popupQty').val(1);
					// === Gọi API lấy size ===
					$.ajax({
					       url: '/api/products/getSize',
					       type: 'GET',
					       data: { productId: currentProductId },
					       success: function (sizes) {
					           const $sizeSelect = $('#popupSize');
					           $sizeSelect.empty(); // clear size cũ

					           if (sizes && sizes.length > 0) {
					               sizes.forEach(function (size) {
					                   $sizeSelect.append(
					                       `<option value="${size}">${size}</option>`
					                   );
					               });
					           } else {
							       $sizeSelect
							           .append('<option selected>Không có size</option>')
							           .prop('disabled', true);
							   }
					       },
					       error: function () {
					           alert('Không lấy được danh sách size');
					       }
					   });

					   // Hiển thị popup
					   $('#cartPopup').removeClass('hidden');

			        // Hiển thị popup
			        $('#cartPopup').removeClass('hidden');
			    });

			    // Đóng popup khi click × hoặc click Hủy
			    $('#closeCartPopup, #popupCancel').on('click', function() {
			        $('#cartPopup').addClass('hidden');
			    });

			    // Đóng popup khi click ra ngoài modal content
			    $('#cartPopup').on('click', function(e) {
			        if ($(e.target).is('#cartPopup')) {
			            $(this).addClass('hidden');
			        }
			    });

			    // Thêm vào giỏ hàng
			    $('#popupAddToCart').on('click', function() {
					const $sizeSelect = $('#popupSize');

					if ($sizeSelect.is(':disabled')) {
					    Swal.fire({
					        icon: 'warning',
					        title: 'Không thể thêm vào giỏ',
					        text: 'Sản phẩm này không có size'
					    });
					    return;
					}
			        const size = $sizeSelect.val();
			        const qty = parseInt($('#popupQty').val()) || 1;

			        $.ajax({
			            url: '/api/cart/add',
			            type: 'POST',
			            headers: { },
			            data: {
			                productId: currentProductId,
			                size: size,
			                quantity: qty
			            },
			            success: function(res) {
							if (res.status === 'success') {
			                    Swal.fire({
			                        icon: 'success',
			                        title: res.message,
			                        showConfirmButton: false,
			                        timer: 1500
			                    });
								const cartBadge = document.getElementById('cart-qty');
			                    if(cartBadge) {
			                        cartBadge.innerText = res.totalItems;
			                        cartBadge.parentElement.classList.add('scale-125');
			                        setTimeout(() => cartBadge.parentElement.classList.remove('scale-125'), 200);
			                    }             
			                } else {
			                    Swal.fire({
			                        icon: 'error',
			                        title: 'Lỗi',
			                        text: res.message
			                    });
			                }
							$('#cartPopup').addClass('hidden');
			            },
			            error: function(err) {
			                alert('Thêm thất bại: ' + err.responseText);
			            }
			        });
			    });

			    // Tăng giảm số lượng
			    $('#cartPopup .quantityPlus').click(function() {
			        const input = $(this).siblings('.quantityDisplay');
			        let current = parseInt(input.val()) || 1;
			        input.val(current + 1);
			    });

			    $('#cartPopup .quantityMinus').click(function() {
			        const input = $(this).siblings('.quantityDisplay');
			        let current = parseInt(input.val()) || 1;
			        if (current > 1) input.val(current - 1);
			    });
			});
		</script>
	</body>
</html>
