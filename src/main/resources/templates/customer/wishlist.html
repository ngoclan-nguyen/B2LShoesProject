<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" type="image/png" th:href="@{/customer/images/logo.png}">
	<title>B2L Shoes - Danh sách yêu thích</title>
	
	<th:block th:if="${_csrf != null}">
	    <meta name="_csrf" th:content="${_csrf.token}">
	    <meta name="_csrf_header" th:content="${_csrf.headerName}">
	</th:block>

	<link rel="stylesheet" href="https://cdn.tailwindcss.com">
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<style>
		* { box-sizing: border-box; }
		body { font-family: 'Montserrat', sans-serif; }
		.text-primary { color: #FF9900; }
		.bg-primary { background-color: #FF9900; }
		.hover\:text-primary:hover { color: #e68a00; }
		.hover\:bg-primary:hover { background-color: #e68a00; }

		.quantityDisplay::-webkit-outer-spin-button,
		.quantityDisplay::-webkit-inner-spin-button {
			-webkit-appearance: none;
			margin: 0;
		}
		.quantityDisplay[type=number] {
			-moz-appearance: textfield;
		}
	</style>
</head>
<body class="bg-white text-black flex flex-col min-h-screen">
<div th:replace="~{customer/fragments/header :: header}"></div>

<div class="bg-gray-50">
	<div class="container mx-auto px-4 py-3 text-sm text-gray-500">
		<a href="/" class="text-gray-900 hover:underline hover:text-black transition">Trang chủ</a>
		<span class="mx-3 text-gray-400">/</span>
		<span class="text-black font-bold border-b border-black">Sản phẩm yêu thích</span>
	</div>
</div>

<div class="container mx-auto flex-grow">

	<div class="px-4 border-b border-gray-200 pb-5 pt-8 mb-8">
		<h2 class="font-bold text-2xl sm:text-3xl text-gray-900 text-left">SẢN PHẨM YÊU THÍCH</h2>
		<p class="text-sm text-gray-500 mt-2">
			Tổng cộng: <span id="wishlistCount" th:text="${userWishlist != null} ? ${userWishlist.size()} : 0" class="font-bold text-black">0</span> sản phẩm
		</p>
	</div>

	<div class="px-4 pb-20">
		<div th:if="${userWishlist == null || userWishlist.isEmpty()}" class="text-center py-20 bg-gray-50 rounded-lg shadow-inner border border-gray-100">
		<h2 class="text-xl sm:text-2xl text-gray-700 font-bold mb-4">Danh sách yêu thích của bạn đang trống!</h2>
		<p class="text-gray-500 mb-8">Hãy tìm và thêm những sản phẩm bạn yêu thích vào đây để mua sau.</p>
		<a th:href="@{/products}" class="bg-primary text-white px-8 py-3 rounded-full font-bold hover:bg-orange-600 shadow-md transition-all duration-300">
			Bắt đầu mua sắm
		</a>
	</div>

		<div th:unless="${userWishlist == null || userWishlist.isEmpty()}"
			 class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-6 gap-y-12">

			<div th:each="product : ${userWishlist}"
				 th:id="'wishlistItem-' + ${product.productId}"
				 class="group wishlistItem flex flex-col justify-between p-2 rounded-lg border border-transparent hover:border-gray-200 transition-all duration-300 cursor-pointer">

				<div>
					<div class="relative mb-3 aspect-square overflow-hidden rounded-lg bg-[#f9f9f9]">
						<button type="button"
								class="removeWishlistBtn absolute top-2 right-2 w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-sm z-10 transition-transform hover:scale-110 hover:bg-red-50/10"
								th:attr="data-id=${product.productId}">
							<i class="fa-solid fa-xmark text-lg text-gray-400 hover:text-red-600"></i>
						</button>

						<img th:src="${product.productImagePath}"
							 alt="Product Image"
							 class="w-full h-full object-contain p-4 mix-blend-multiply transition duration-500 ease-in-out group-hover:scale-105">
					</div>

					<a th:href="@{'/product/' + ${product.productId}}" class="block">
						<p class="text-sm text-gray-900 line-clamp-2 font-bold hover:text-primary transition" th:text="${product.productName}">Tên sản phẩm</p>
					</a>

					<p class="font-bold text-sm text-red-600 mt-1" th:text="${#numbers.formatDecimal(product.productPrice, 0, 'POINT', 0, 'COMMA')} + ' đ'">Giá</p>
					<p class="text-xs text-gray-500 line-clamp-2 mt-1" th:text="${product.productDescription}">Mô tả (ẩn bớt nếu cần)</p>
				</div>

				<div class="w-full flex justify-between gap-3 mt-4">
					<button type="button"
							class="addToCartBtn w-full flex items-center justify-center gap-2 bg-primary text-white py-2 px-3 rounded-lg hover:bg-orange-600 shadow transition-all duration-300 text-sm font-bold" th:data-id="${product.productId}"
							th:data-name="${product.productName}"
							th:data-image="${product.productImagePath}"
							th:data-price="${product.productPrice}">
						<i class="fa-solid fa-cart-shopping"></i> Thêm vào giỏ
					</button>
				</div>
			</div>
		</div>
	</div>
</div>

<div id="cartPopup" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 transition-opacity duration-300">
	<div class="bg-white rounded-xl p-8 w-full max-w-xl relative transform scale-95 transition-transform duration-300">
		<button id="closeCartPopup" class="absolute top-3 right-3 text-gray-500 hover:text-black text-3xl font-light">&times;</button>
		<h3 class="text-2xl font-bold text-gray-900 border-b pb-3 mb-6">Thêm vào Giỏ hàng</h3>

		<div class="flex flex-col gap-6">
			<div class="flex gap-6">
				<img id="popupImage" class="w-28 h-28 object-cover border border-gray-200 rounded-lg" src="" alt="Product Image">
				<div class="flex flex-col items-start justify-center">
					<a id="popupName" class="text-lg font-bold hover:text-primary transition" href=""></a>
					<p id="popupPrice" class="text-red-600 font-bold text-xl mt-1"></p>
				</div>
			</div>

			<div class="grid grid-cols-2 gap-4">
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-2">Chọn Size:</label>
					<select id="popupSize" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:border-black transition text-base"></select>
				</div>

				<div>
					<label class="block text-sm font-medium text-gray-700 mb-2">Số lượng:</label>
					<div class="popupQuantity flex items-center w-32 border border-gray-300 rounded-lg overflow-hidden">
						<button class="quantityMinus text-xl w-1/3 h-10 hover:bg-gray-100 transition flex items-center justify-center font-bold text-gray-600">-</button>
						<input id="popupQty" class="quantityDisplay w-1/3 h-10 text-center text-base focus:outline-none border-x border-gray-300" type="number" value="1" min="1">
						<button class="quantityPlus text-xl w-1/3 h-10 hover:bg-gray-100 transition flex items-center justify-center font-bold text-gray-600">+</button>
					</div>
				</div>
			</div>
		</div>

		<div class="flex justify-end gap-3 mt-8">
			<button id="popupCancel" class="bg-white text-black px-5 py-2 rounded-full font-bold border border-black hover:bg-black hover:text-white transition">Hủy</button>
			<button id="popupAddToCart" class="bg-primary text-white px-5 py-2 rounded-full font-bold hover:bg-orange-600 transition">Thêm vào giỏ</button>
		</div>
	</div>
</div>

<div th:replace="~{customer/fragments/footer :: footer}"></div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="/customer/js/wishlist.js"></script>
</body>
</html>
