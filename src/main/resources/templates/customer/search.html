<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Tìm kiếm - B2L Shoes</title>
    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-white text-black">

<div th:replace="~{customer/fragments/header :: header}"></div>

<div class="container mx-auto px-4 py-8 min-h-screen">

    <div class="text-sm text-gray-500 mb-6 uppercase">
        <a href="/">Trang chủ</a> <span class="mx-2">></span> <span class="text-black font-bold border-b border-black">Tìm kiếm</span>
    </div>

    <div class="mb-6">
        <p class="text-lg">Kết quả tìm kiếm cho: <strong class="text-2xl">"[[${keyword}]]"</strong></p>
    </div>

    <div class="bg-gray-100 p-3 mb-8 flex flex-wrap items-center gap-4 rounded-sm text-sm">
        <span class="font-bold text-gray-700">Sắp xếp theo</span>

        <a th:href="@{/search(keyword=${keyword}, sort='relevant')}"
           th:class="${sort == 'relevant' ? 'bg-[#FF9900] text-white px-4 py-2 rounded' : 'bg-white text-black px-4 py-2 rounded hover:bg-gray-200'}">Liên quan</a>

        <a th:href="@{/search(keyword=${keyword}, sort='newest')}"
           th:class="${sort == 'newest' ? 'bg-[#FF9900] text-white px-4 py-2 rounded' : 'bg-white text-black px-4 py-2 rounded hover:bg-gray-200'}">Mới nhất</a>

        <select class="bg-white px-4 py-2 rounded border border-gray-300 outline-none cursor-pointer"
                onchange="location = this.value;">
            <option value="" disabled selected>Giá</option>
            <option th:value="@{/search(keyword=${keyword}, sort='price_asc')}" th:selected="${sort == 'price_asc'}">Giá: Thấp đến Cao</option>
            <option th:value="@{/search(keyword=${keyword}, sort='price_desc')}" th:selected="${sort == 'price_desc'}">Giá: Cao đến Thấp</option>
        </select>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6" th:if="${products != null && !products.isEmpty()}">
        <div th:each="product : ${products}" class="group cursor-pointer border border-transparent hover:border-gray-200 p-2 rounded transition">
            <div class="relative aspect-square bg-[#f5f5f5] mb-4 overflow-hidden rounded">
                <a th:href="@{'/product/' + ${product.id}}">
                    <img th:src="@{${product.image}}" class="w-full h-full object-contain p-4 group-hover:scale-110 transition duration-500 mix-blend-multiply">
                </a>
            </div>
            <div>
                <a th:href="@{'/product/' + ${product.id}}">
                    <h3 class="font-bold text-sm mb-1 line-clamp-2 hover:text-[#FF9900] transition" th:text="${product.name}">Tên Giày</h3>
                </a>
                <p class="text-xs text-gray-500 mb-2" th:text="${product.categoryName}">Category</p>
                <p class="font-bold text-red-600 text-base"
                   th:text="${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')} + '₫'">Giá</p>
            </div>
        </div>
    </div>

    <div th:if="${products == null || products.isEmpty()}" class="text-center py-16">
        <i class="fa-solid fa-magnifying-glass text-6xl text-gray-300 mb-4"></i>
        <p class="text-gray-500 text-lg">Không tìm thấy sản phẩm nào phù hợp.</p>
        <a href="/" class="text-[#FF9900] font-bold hover:underline mt-2 block">Xem tất cả sản phẩm</a>
    </div>

    <div class="flex justify-center mt-12 gap-2" th:if="${totalPages > 1}">
        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/search(keyword=${keyword}, sort=${sort}, page=${i})}"
               th:text="${i + 1}"
               th:class="${currentPage == i ? 'px-4 py-2 bg-[#FF9900] text-white font-bold rounded' : 'px-4 py-2 border rounded hover:bg-gray-100'}">
            </a>
        </th:block>
    </div>

</div>

<div th:replace="~{customer/fragments/footer :: footer}"></div>

</body>
</html>
