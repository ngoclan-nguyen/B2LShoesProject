<header th:fragment="header" id="main-header"
        class="font-['Montserrat'] pb-2 sticky top-0 z-50 bg-white/95 backdrop-blur-md transition-all duration-300 border-b border-transparent shadow-sm">

    <div class="container mx-auto px-4 py-3 md:py-4">
        <div class="flex flex-wrap md:flex-nowrap justify-between items-center gap-4">

            <div class="flex items-center gap-3">
                <button id="mobile-menu-btn" class="md:hidden text-2xl p-1 active:scale-90 transition hover:text-orange-500">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <div class="flex items-center gap-2">
                    <img th:src="@{/customer/images/logo.png}" class="w-[30px] h-[30px] md:w-[40px] md:h-[40px]"/>
                    <a href="/" class="flex items-center gap-3 group">
                        <div class="text-xl md:text-2xl font-black italic uppercase tracking-tight text-black">
                            B<span class="text-orange-600">2</span>L Shoes
                        </div>
                    </a>
                </div>
            </div>

            <form action="/search" method="get" class="hidden md:flex flex-1 max-w-xl w-full relative group transition-all duration-300 focus-within:scale-105">
                <input type="text" name="keyword" placeholder="Tìm kiếm sản phẩm..."
                       class="w-full border border-gray-300 rounded-full px-5 py-2 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-all shadow-sm">

                <button type="submit" class="absolute right-1 top-1 h-[calc(100%-8px)] bg-black text-white px-4 rounded-full hover:bg-orange-600 transition active:scale-95">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>

            <div class="flex items-center gap-4 md:gap-6 text-xl md:text-2xl">

                <a href="#" class="hover:text-red-500 transition transform hover:scale-110"><i class="fa-regular fa-heart"></i></a>

                <a href="/cart" class="hover:text-orange-500 transition transform hover:scale-110 relative">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-qty" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold shadow-sm">0</span>
                </a>

                <a href="/login" class="hover:text-gray-600 transition transform hover:scale-110"><i class="fa-regular fa-circle-user"></i></a>
            </div>
        </div>

        <nav class="hidden md:block mt-4 border-t border-gray-100 pt-2">
            <ul class="flex flex-wrap justify-center gap-8 lg:gap-16 py-2 font-bold text-sm uppercase">
                <li><a href="/" class="hover:text-orange-500 hover:underline underline-offset-4 transition">Trang Chủ</a></li>
                <li><a href="/products" class="hover:text-orange-500 hover:underline underline-offset-4 transition">Cửa Hàng</a></li>
                <li><a href="#" class="hover:text-orange-500 hover:underline underline-offset-4 transition">Thương Hiệu</a></li>
                <li><a href="/about-us" class="hover:text-orange-500 hover:underline underline-offset-4 transition">Về chúng tôi</a></li>

                <li class="relative group cursor-pointer">
                    <span class="hover:text-orange-500 hover:underline underline-offset-4 transition flex items-center gap-1">
                        Hỗ trợ <i class="fa-solid fa-caret-down text-xs"></i>
                    </span>
                    <ul class="absolute left-0 top-full mt-2 w-56 bg-white shadow-xl rounded-md hidden group-hover:block z-50 border border-gray-100 animate-[fadeIn_0.2s_ease-out]">
                        <li><a href="/shopping-guide" class="block px-4 py-3 hover:bg-gray-50 hover:text-orange-500 border-b border-gray-100 transition">Hướng dẫn mua hàng</a></li>
                        <li><a href="/size-guide" class="block px-4 py-3 hover:bg-gray-50 hover:text-orange-500 transition">Chọn size giày</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </div>

    <div id="mobile-menu" class="hidden fixed inset-0 bg-white z-[60] flex-col p-6 overflow-y-auto transition-transform duration-300 shadow-2xl">

        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <div class="text-xl font-extrabold italic uppercase tracking-tight text-black">
                B<span class="text-orange-600">2</span>L Shoes
            </div>
            <button id="close-menu-btn" class="text-3xl hover:text-red-500 hover:rotate-90 transition duration-300"><i class="fa-solid fa-times"></i></button>
        </div>

        <form action="/search" method="get" class="relative w-full mb-6">
            <input type="text" name="keyword" placeholder="Tìm kiếm sản phẩm..." class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-orange-500 transition-colors">
            <button type="submit" class="absolute right-3 top-3 text-gray-400 hover:text-orange-500">
                <i class="fa-solid fa-magnifying-glass text-xl"></i>
            </button>
        </form>

        <ul class="flex flex-col gap-6 font-bold text-lg uppercase text-gray-800">
            <li><a href="/" class="block hover:text-orange-500 hover:pl-2 transition-all">Trang Chủ</a></li>
            <li><a href="/products" class="block hover:text-orange-500 hover:pl-2 transition-all">Cửa Hàng</a></li>
            <li><a href="#" class="block hover:text-orange-500 hover:pl-2 transition-all">Thương Hiệu</a></li>
            <li><a href="/about-us" class="block hover:text-orange-500 hover:pl-2 transition-all">Về chúng tôi</a></li>

            <li class="border-t pt-4 mt-2">
                <p class="text-gray-400 text-sm mb-3">Hỗ trợ khách hàng</p>
                <ul class="pl-4 space-y-4 text-base">
                    <li><a href="/shopping-guide" class="block hover:text-orange-500 font-medium">Hướng dẫn mua hàng</a></li>
                    <li><a href="/size-guide" class="block hover:text-orange-500 font-medium">Chọn size giày</a></li>
                </ul>
            </li>
        </ul>
    </div>
</header>
