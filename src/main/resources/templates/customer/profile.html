<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông tin tài khoản - B2L Shoes</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-800 flex flex-col min-h-screen">

<header th:replace="~{customer/fragments/header}"></header>

<div class="bg-gray-50">
    <div class="container mx-auto px-4 py-3 text-sm text-gray-500">
        <a href="/" class="text-gray-900 hover:underline hover:text-black transition">Trang chủ</a>
        <span class="mx-3 text-gray-400">/</span>
        <span class="text-black font-bold border-b border-black">Tài khoản</span>
    </div>
</div>

<section class="container mx-auto px-4 py-10 flex-grow">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">

        <aside class="md:col-span-1">
            <div class="bg-gray-50 rounded-xl p-6 border border-gray-100 shadow-sm sticky top-24">

                <div class="flex items-center gap-4 mb-8 pb-6 border-b border-gray-200">
                    <div class="w-14 h-14 bg-gray-200 rounded-full flex items-center justify-center text-xl font-bold text-gray-500 border-2 border-white shadow-md">
                        <span th:text="${#strings.substring(session.currentCustomer.name, 0, 1).toUpperCase()}">U</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-500">Xin chào,</p>
                        <h3 class="font-bold text-gray-800 truncate" th:text="${session.currentCustomer.name}">User Name</h3>
                    </div>
                </div>

                <nav class="space-y-1">
                    <a href="/customer/profile" class="flex items-center gap-3 px-4 py-3 bg-white text-[#FF9900] font-bold rounded-lg shadow-sm border border-gray-100">
                        <i class="fa-regular fa-user w-5 text-center"></i> Thông tin tài khoản
                    </a>

                    <a href="/customer/orders" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-white hover:text-black hover:font-bold hover:shadow-sm rounded-lg transition-all">
                        <i class="fa-solid fa-box-open w-5 text-center"></i> Đơn hàng của tôi
                    </a>

                    <a href="/customer/vouchers" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-white hover:text-black hover:font-bold hover:shadow-sm rounded-lg transition-all">
                        <i class="fa-solid fa-map-location-dot w-5 text-center"></i> Ví voucher của tôi
                    </a>

                    <a href="/logout" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 font-medium rounded-lg transition-all mt-4 border-t border-transparent hover:border-red-100">
                        <i class="fa-solid fa-right-from-bracket w-5 text-center"></i> Đăng xuất
                    </a>
                </nav>
            </div>
        </aside>

        <div class="md:col-span-3">
            <div class="bg-white">
                <h2 class="text-2xl font-bold uppercase mb-6 flex items-center gap-3">
                    Thông tin tài khoản
                    <span class="text-xs font-normal normal-case bg-green-100 text-green-700 px-2 py-1 rounded-full border border-green-200">
                            <i class="fa-solid fa-check-circle mr-1"></i>Đã xác thực
                        </span>
                </h2>

                <form id="updateProfileForm" class="max-w-2xl" onsubmit="return false;">

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 items-center border-b border-gray-50 pb-6">
                        <label class="font-bold text-gray-600">Họ và tên:</label>
                        <div class="md:col-span-2">
                            <input type="text" name="name" th:value="${session.currentCustomer.name}" required
                                   class="w-full p-3 border border-gray-200 rounded focus:outline-none focus:border-[#FF9900] focus:ring-1 focus:ring-[#FF9900] transition-colors">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 items-center border-b border-gray-50 pb-6">
                        <label class="font-bold text-gray-600">Email:</label>
                        <div class="md:col-span-2 relative">
                            <input type="email" th:value="${session.currentCustomer.email}" readonly
                                   class="w-full p-3 bg-gray-100 border border-gray-200 rounded text-gray-500 cursor-not-allowed">
                            <span class="absolute right-3 top-3.5 text-xs text-gray-400"><i class="fa-solid fa-lock"></i> Không thể thay đổi</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 items-center border-b border-gray-50 pb-6">
                        <label class="font-bold text-gray-600">Số điện thoại:</label>
                        <div class="md:col-span-2">
                            <input type="tel" name="phone" th:value="${session.currentCustomer.phone}"
                                   class="w-full p-3 border border-gray-200 rounded focus:outline-none focus:border-[#FF9900] focus:ring-1 focus:ring-[#FF9900] transition-colors">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 items-start border-b border-gray-50 pb-6">
                        <label class="font-bold text-gray-600 mt-3">Địa chỉ:</label>
                        <div class="md:col-span-2 space-y-3">

                            <div class="bg-orange-50 p-3 rounded text-sm text-gray-600 border border-orange-100">
                                <span class="font-bold">Hiện tại:</span>
                                <span id="currentAddress" th:text="${session.currentCustomer.address != null ? session.currentCustomer.address : 'Chưa cập nhật'}"></span>
                            </div>
							<input type="hidden" id="fullAddress" name="address" th:value="${session.currentCustomer.address}">

                            <div class="grid grid-cols-2 gap-3">
                                <div class="flex flex-col">
									<label for="province"
										class="ml-auto text-red-500 font-bold text-lg select-none">
								        *
								    </label>
									<select id="province" required
										class="col-span-2 md:col-span-1 p-3 border border-gray-200 rounded focus:border-[#FF9900] focus:outline-none text-sm">
	                                    <option value="">Chọn Tỉnh/Thành</option>
	                                </select>
								</div>
								
								<div class="flex flex-col">
									<label for="district"
										class="ml-auto text-red-500 font-bold text-lg select-none">
								        *
								    </label>
									<select id="district" required
										class="col-span-2 md:col-span-1 p-3 border border-gray-200 rounded focus:border-[#FF9900] focus:outline-none text-sm">
	                                    <option value="">Chọn Quận/Huyện</option>
	                                </select>
								</div>
								
								<div class="flex flex-col col-span-2">
									<label for="ward"
										class="ml-auto text-red-500 font-bold text-lg select-none">
								        *
								    </label>
									<select id="ward" required
										class="p-3 border border-gray-200 rounded focus:border-[#FF9900] focus:outline-none text-sm">
	                                	<option value="">Chọn Phường/Xã</option>
	                            	</select>
								</div>  
                            </div>

							<div class="flex flex-col">
								<label for="houseNumber"
									class="ml-auto text-red-500 font-bold text-lg select-none">
							        *
							    </label>
							    <input type="text"
							           id="houseNumber"
							           placeholder="Số nhà, tên đường cụ thể..."
							           required
							           class="w-full p-3 pr-8 border border-gray-200 rounded focus:outline-none focus:border-[#FF9900] text-sm">
							</div>
                        </div>
                    </div>

                    <div class="md:pl-[33.33%] flex flex-wrap gap-4">
                        <button type="submit"
                                class="px-6 py-3 bg-[#FF9900] text-white font-bold uppercase rounded shadow-md hover:bg-[#e68a00] hover:shadow-lg transition-all transform active:scale-95 flex items-center gap-2">
                            <i class="fa-solid fa-floppy-disk"></i> Cập nhật
                        </button>

                        <a href="/change-password"
                           class="px-6 py-3 bg-white text-gray-700 font-bold uppercase rounded border border-gray-300 hover:bg-gray-50 hover:text-black hover:border-gray-400 transition-all transform active:scale-95 flex items-center gap-2">
                            <i class="fa-solid fa-key"></i> Đổi mật khẩu
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{customer/fragments/footer}"></footer>

<script th:inline="javascript">
    /*<![CDATA[*/
    // 1. Thông báo
    var successMsg = /*[[${success}]]*/ null;
    if(successMsg) {
        Swal.fire({
            title: 'Thành công!',
            text: successMsg,
            icon: 'success',
            confirmButtonColor: '#FF9900'
        });
    }

    // 2. Xử lý ĐỊA CHỈ OFFLINE (JSON Local)
    $(document).ready(function() {
        var localData = [];

        // Tải file JSON từ thư mục static
        $.getJSON('/data/address_data.json', function(data) {
            localData = data;
            // Load Tỉnh
            $.each(data, function(key, val) {
                $("#province").append('<option value="' + val.Id + '">' + val.Name + '</option>');
            });
        }).fail(function(){
            console.log("Không tìm thấy file JSON địa chỉ!");
        });

        // Chọn Tỉnh -> Load Huyện
        $("#province").change(function() {
            var idTinh = $(this).val();

            $("#district").html('<option value="">Chọn Quận/Huyện</option>');
            $("#ward").html('<option value="">Chọn Phường/Xã</option>');

            if(idTinh !== '') {
                var resultTinh = localData.filter(n => n.Id === idTinh);
                if(resultTinh.length > 0) {
                    $.each(resultTinh[0].Districts, function(key, val) {
                        $("#district").append('<option value="' + val.Id + '">' + val.Name + '</option>');
                    });
                }
            }
        });

        // Chọn Huyện -> Load Xã
        $("#district").change(function() {
            var idTinh = $("#province").val();
            var idHuyen = $(this).val();

            $("#ward").html('<option value="">Chọn Phường/Xã</option>');

            if(idHuyen !== '') {
                var resultTinh = localData.filter(n => n.Id === idTinh);
                if(resultTinh.length > 0) {
                    var resultHuyen = resultTinh[0].Districts.filter(n => n.Id === idHuyen);
                    if(resultHuyen.length > 0) {
                        $.each(resultHuyen[0].Wards, function(key, val) {
                            $("#ward").append('<option value="' + val.Id + '">' + val.Name + '</option>');
                        });
                    }
                }
            }
        });
    });

	$("#updateProfileForm").submit(function (e) {
	    e.preventDefault(); // chặn reload

	    // Ghép địa chỉ trước khi gửi
	    var provinceText = $("#province option:selected").text();
	    var districtText = $("#district option:selected").text();
	    var wardText = $("#ward option:selected").text();
	    var houseNumber = $("#houseNumber").val().trim();

	    if ($("#province").val() && $("#district").val() && $("#ward").val() && houseNumber) {
	        var finalAddress = houseNumber + ", " + wardText + ", " + districtText + ", " + provinceText;
	        $("#fullAddress").val(finalAddress);
	    }

	    // AJAX gửi form
	    $.ajax({
	        url: '/api/user/update-profile',
	        type: 'POST',
	        data: $(this).serialize(), // gửi tất cả input, bao gồm hidden
	        success: function (res) {
	            if (res.status === 'success') {
	                Swal.fire({
	                    icon: 'success',
	                    title: 'Thành công',
	                    text: res.message,
	                    confirmButtonColor: '#FF9900'
	                });
					
					if(res.data){
	                    $("input[name='name']").val(res.data.name);
	                    $("input[name='phone']").val(res.data.phone);  
	                    $("#currentAddress").text(res.data.address);
	                    $("#fullAddress").val(res.data.address);
	                }
	            } else {
	                Swal.fire({
	                    icon: 'error',
	                    title: 'Lỗi',
	                    text: res.message
	                });
	            }
	        },
	        error: function () {
	            Swal.fire({
	                icon: 'error',
	                title: 'Lỗi',
	                text: 'Không thể kết nối server'
	            });
	        }
	    });
	});
</script>

</body>
</html>
