<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${pageTitle} + ' - B2L Shoes'">Sản phẩm</title>
	
	<th:block th:if="${_csrf != null}">
	    <meta name="_csrf" th:content="${_csrf.token}">
	    <meta name="_csrf_header" th:content="${_csrf.headerName}">
	</th:block>

    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        input[type="checkbox"], input[type="radio"] {
            accent-color: black; width: 16px; height: 16px; cursor: pointer;
        }
    </style>
</head>
<body class="bg-white text-black flex flex-col min-h-screen">

<div th:replace="~{customer/fragments/header :: header}"></div>

<div class="bg-gray-50">
    <div class="container mx-auto px-4 py-3 text-sm text-gray-500">
        <a href="/" class="text-gray-900 hover:underline hover:text-black transition">Trang chủ</a>
        <span class="mx-3 text-gray-400">/</span>
        <span class="text-black font-bold border-b border-black">Sản phẩm</span>
    </div>
</div>

<div class="container mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8 flex-grow">

    <aside class="w-full lg:w-1/4 flex-shrink-0">
        <div class="bg-[#f9f9f9] p-5 rounded-sm sticky top-24 max-h-[calc(100vh-100px)] overflow-y-auto custom-scrollbar">

            <div class="flex justify-between items-center mb-4 border-b border-gray-200 pb-2">
                <h3 class="font-bold text-sm uppercase">LỌC THEO</h3>
                <a href="/products" class="text-xs text-gray-500 hover:text-black"><i class="fa-solid fa-rotate-right"></i> Xóa lọc</a>
            </div>

            <form id="filterForm" action="/products" method="get">

                <input type="hidden" name="keyword" th:value="${keyword}">

                <div class="mb-6">
                    <h4 class="font-bold text-xs uppercase mb-3 tracking-wide">GIỚI TÍNH</h4>
                    <div class="space-y-2">
                        <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600 hover:text-black">
                            <input type="checkbox" name="gender" value="Nam" onchange="submitFilter()"
                                   th:checked="${selectedGender != null && #lists.contains(selectedGender, 'Nam')}"> Nam
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600 hover:text-black">
                            <input type="checkbox" name="gender" value="Nu" onchange="submitFilter()"
                                   th:checked="${selectedGender != null && #lists.contains(selectedGender, 'Nu')}"> Nữ
                        </label>
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="font-bold text-xs uppercase mb-3 tracking-wide bg-gray-100 p-1">GIÀY THỂ THAO</h4>
                    <div class="space-y-2 max-h-40 overflow-y-auto custom-scrollbar">
                        <th:block th:if="${allSports != null}">
                            <div th:each="s : ${allSports}">
                                <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600 hover:text-black">
                                    <input type="checkbox" name="sport" th:value="${s.name}" onchange="submitFilter()"
                                           th:checked="${selectedSport != null && #lists.contains(selectedSport, s.name)}">
                                    <span th:text="${s.name}">Tên môn</span>
                                </label>
                            </div>
                        </th:block>
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="font-bold text-xs uppercase mb-3 tracking-wide bg-gray-100 p-1">THƯƠNG HIỆU</h4>
                    <div class="space-y-2">
                        <th:block th:each="brand : ${ {'Adidas', 'Nike', 'Puma', 'Mizuno', 'Li-Ning'} }">
                            <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600 hover:text-black">
                                <input type="checkbox" name="brand" th:value="${brand}" onchange="submitFilter()"
                                       th:checked="${selectedBrand != null && #lists.contains(selectedBrand, brand)}">
                                <span th:text="${brand}">Brand</span>
                            </label>
                        </th:block>
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="font-bold text-xs uppercase mb-3 tracking-wide bg-gray-100 p-1">MÀU SẮC</h4>
                    <div class="flex flex-wrap gap-2">
                        <th:block th:each="color : ${ {'Đen', 'Trắng', 'Đỏ', 'Xanh Dương'} }">
                            <label class="cursor-pointer" th:title="${color}">
                                <input type="checkbox" name="color" th:value="${color}" class="peer sr-only" onchange="submitFilter()"
                                       th:checked="${selectedColor != null && #lists.contains(selectedColor, color)}">
                                <span class="block w-6 h-6 rounded-full border border-gray-300 peer-checked:ring-2 peer-checked:ring-offset-1 peer-checked:ring-black"
                                      th:style="'background-color: ' + (${color == 'Đen' ? '#000' : (color == 'Trắng' ? '#fff' : (color == 'Đỏ' ? '#dc2626' : '#2563eb'))})">
                                    </span>
                            </label>
                        </th:block>
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="font-bold text-xs uppercase mb-3 tracking-wide bg-gray-100 p-1">KÍCH THƯỚC</h4>

                    <div class="flex flex-wrap gap-2">
                        <th:block th:if="${allSizes != null && !allSizes.isEmpty()}">
                            <div th:each="size : ${allSizes}">
                                <input type="checkbox"
                                       name="size"
                                       th:value="${size}"
                                       th:id="'filter-size-' + ${size}"
                                       class="peer hidden"
                                       onchange="submitFilter()"
                                       th:checked="${selectedSize != null && #lists.contains(selectedSize, size)}">

                                <label th:for="'filter-size-' + ${size}"
                                       th:text="${size}"
                                       class="w-10 h-8 flex items-center justify-center border border-gray-300 rounded cursor-pointer text-xs font-bold bg-white text-gray-600 hover:border-black peer-checked:bg-black peer-checked:text-white transition-all">
                                    39
                                </label>
                            </div>
                        </th:block>
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="font-bold text-xs uppercase mb-3 tracking-wide bg-gray-100 p-1">GIÁ</h4>
                    <div class="space-y-2">
                        <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600 hover:text-black">
                            <input type="radio" name="priceRange" value="lt1m" onchange="submitFilter()" th:checked="${selectedPrice == 'lt1m'}"> < 1.000.000 đ
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600 hover:text-black">
                            <input type="radio" name="priceRange" value="1m-2m" onchange="submitFilter()" th:checked="${selectedPrice == '1m-2m'}"> 1tr - 2tr
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600 hover:text-black">
                            <input type="radio" name="priceRange" value="gt2m" onchange="submitFilter()" th:checked="${selectedPrice == 'gt2m'}"> > 2.000.000 đ
                        </label>
                    </div>
                </div>

            </form>
        </div>
    </aside>

    <main class="flex-1">

        <div class="mb-6 relative">
            <input type="text" id="pageSearchInput"
                   th:value="${keyword}"
                   placeholder="Tìm kiếm sản phẩm trong trang này..."
                   class="w-full border border-gray-200 rounded-sm px-4 py-3 text-sm focus:outline-none focus:border-black pr-10">

            <button onclick="searchInPage()" class="absolute right-3 top-3 text-gray-400 hover:text-[#FF9900] transition">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div id="product-list-container" th:fragment="productList">

            <p class="mb-4 text-sm text-gray-500">
                Tìm thấy <span class="font-bold text-black" th:text="${products != null ? products.size() : 0}">0</span> sản phẩm
            </p>

            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                <div th:each="product : ${products}" class="group relative">
                    <div class="relative aspect-square bg-[#f9f9f9] mb-3 overflow-hidden rounded-sm border border-transparent hover:border-gray-200 transition-all">
						<button type="button"
						        class="wishlist-toggle absolute top-2 right-2 w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-sm z-10 transition opacity-0 group-hover:opacity-100 transform translate-y-2 group-hover:translate-y-0 hover:bg-red-50"
						        th:attr="data-product-id=${product.id}"
						        onclick="toggleWishlist(this)">
						    
						    <i class="fa-heart transition-colors duration-300"
						       th:classappend="${userWishlistProductIds != null and #lists.contains(userWishlistProductIds, product.id)} ? 'fa-solid text-red-500' : 'fa-regular text-gray-400 hover:text-red-500'">
						    </i>
						</button>

                        <a th:href="@{'/product/' + ${product.id}}">
                            <img th:src="@{${product.image}}" class="w-full h-full object-contain p-4 mix-blend-multiply group-hover:scale-110 transition duration-500 ease-in-out">
                        </a>

                        <button class="absolute bottom-0 left-0 w-full bg-[#FF9900] text-white py-2 text-xs font-bold uppercase translate-y-full group-hover:translate-y-0 transition duration-300 flex items-center justify-center gap-2 hover:bg-[#e68a00] add-to-cart-btn"
                                th:attr="data-product-id=${product.id}"
                                th:onclick="addToCart(this, null)"> <i class="fa-solid fa-cart-plus"></i> Thêm vào giỏ
                        </button>
                    </div>

                    <div class="text-left">
                        <p class="text-[10px] text-gray-400 uppercase font-bold mb-1"
                           th:text="${product.brand != null ? product.brand : 'B2L SHOES'}">BRAND</p>
                        <a th:href="@{'/product/' + ${product.id}}">
                            <h3 class="font-bold text-xs md:text-sm mb-1 truncate text-gray-900 hover:text-[#FF9900] transition" th:text="${product.name}">Tên</h3>
                        </a>
                        <p class="font-bold text-sm text-[#FF9900]"
                           th:text="${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')} + ' đ'">Giá</p>
                    </div>
                </div>
            </div>

            <div th:if="${products == null || products.isEmpty()}" class="text-center py-16 bg-gray-50 mt-4 rounded-lg">
                <p class="text-gray-500">Không tìm thấy sản phẩm nào phù hợp.</p>
            </div>

        </div>

    </main>
</div>

<div th:replace="~{customer/fragments/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
	const csrfToken  = document.querySelector("meta[name='_csrf']")?.content;
	const csrfHeader = document.querySelector("meta[name='_csrf_header']")?.content;

	// Tự động gắn CSRF token cho TẤT CẢ request AJAX
	$.ajaxSetup({
	    beforeSend: function (xhr) {
	        if (csrfToken && csrfHeader) {
	            xhr.setRequestHeader(csrfHeader, csrfToken);
	        }
	    }
	});
			
    // Hàm AJAX xử lý lọc không load lại trang
    function submitFilter() {
        const form = document.getElementById('filterForm');

        // Tạo URL từ dữ liệu form
        const formData = new FormData(form);
        const params = new URLSearchParams(formData);

        // Thêm keyword từ thanh tìm kiếm
        const keyword = document.getElementById('pageSearchInput').value.trim();
        if (keyword) {
            params.set('keyword', keyword);
        }

        // Cập nhật URL trên trình duyệt (để F5 vẫn giữ kết quả lọc)
        const newUrl = window.location.pathname + "?" + params.toString();
        window.history.pushState({}, '', newUrl);

        // Gọi AJAX lên Server
        fetch('/products/ajax?' + params.toString())
            .then(response => {
                if (!response.ok) throw new Error('Lỗi mạng');
                return response.text();
            })
            .then(html => {
                // Thay thế nội dung HTML cũ bằng HTML mới nhận được
                const productListContainer = document.getElementById('product-list-container');
                if (productListContainer) {
                    productListContainer.outerHTML = html;
                }
            })
            .catch(error => console.error('Lỗi lọc sản phẩm:', error));
    }

    function searchInPage() {
        // Chỉ cần gọi submitFilter, nó sẽ tự lấy keyword từ ô input
        submitFilter();
    }

    function handleEnter(event) {
        if (event.key === 'Enter') {
            event.preventDefault(); // Chặn submit form mặc định nếu có
            searchInPage();
        }
    }
	
	function toggleWishlist(btnElement) {
	        const btn = $(btnElement);
	        const icon = btn.find('i');
	        const productId = btn.attr('data-product-id');
	        
	        // Kiểm tra trạng thái hiện tại dựa trên class của icon
	        // Nếu đang là solid (đậm) -> tức là đang thích -> hành động là Xóa
	        const isLiked = icon.hasClass('fa-solid');
	        
	        const url = isLiked ? `/api/wishlist/remove?productId=${productId}` : `/api/wishlist/add?productId=${productId}`;

	        $.ajax({
	            url: url,
	            type: 'POST',
	            success: function(data) {
	                // Xử lý giao diện ngay lập tức
	                if (isLiked) {
	                    // Đang thích -> Thành không thích
	                    icon.removeClass('fa-solid text-red-500').addClass('fa-regular text-gray-400');
						Swal.fire({
		                    icon: 'error', // Hoặc 'warning' nếu muốn icon chấm than
		                    title: 'Đã xóa khỏi danh sách yêu thích',
		                    toast: true, position: 'top-end', showConfirmButton: false, timer: 2000
		                });
	                } else {
	                    // Chưa thích -> Thành thích
	                    icon.removeClass('fa-regular text-gray-400').addClass('fa-solid text-red-500');
						Swal.fire({
		                    icon: 'success',
		                    title: 'Đã thêm vào danh sách yêu thích',
		                    toast: true, position: 'top-end', showConfirmButton: false, timer: 2000
		                });
	                }
	            },
	            error: function(xhr) {
	                if (xhr.status === 401) {
	                    Swal.fire({
	                        icon: 'warning',
	                        title: 'Bạn chưa đăng nhập!',
	                        text: 'Vui lòng đăng nhập để lưu sản phẩm yêu thích.',
	                        showCancelButton: true,
	                        confirmButtonText: 'Đăng nhập ngay',
	                        cancelButtonText: 'Hủy',
							customClass: {
							            title: 'text-red-500',       // đổi màu tiêu đề
							            content: 'text-gray-700',    // đổi màu nội dung
							            confirmButton: 'bg-[#FF9900] text-white px-4 py-2 rounded font-bold hover:bg-orange-600', // nút xác nhận
							            cancelButton: 'bg-white text-black px-4 py-2 rounded font-bold border border-black hover:bg-black hover:text-white'   // nút hủy
							        }
	                    }).then((result) => {
	                        if (result.isConfirmed) {
	                            window.location.href = '/login';
	                        }
	                    });
	                } else {
	                    Swal.fire('Lỗi', 'Không thể cập nhật danh sách yêu thích', 'error');
	                    console.error(xhr.responseText);
	                }
	            }
	        });
	    }
    function addToCart(btnElement, size) {
        const btn = $(btnElement);
        const productId = btn.attr('data-product-id');

        // Xây dựng URL với các tham số, size được bỏ qua nếu là null
        const url = `/api/cart/add?productId=${productId}&quantity=1` + (size ? `&size=${size}` : '');

        // Vô hiệu hóa nút trong khi chờ phản hồi
        btn.prop('disabled', true).html('Đang thêm...');

        $.ajax({
            url: url,
            type: 'POST',
            dataType: 'json',
            success: function(response) {
                // Re-enable nút
                btn.prop('disabled', false).html('<i class="fa-solid fa-cart-plus"></i> Thêm vào giỏ');

                // --- Xử lý logic từ Controller ---
                if (response.status === 'error') {
                    if (response.message === 'auth_required') {
                        // Lỗi 401: Yêu cầu đăng nhập (dù Controller trả về 200 OK)
                        showAuthRequiredAlert();
                    } else {
                        // Lỗi nghiệp vụ (Hết hàng, thiếu kho)
                        Swal.fire('Thất bại', response.message, 'warning');
                    }
                } else if (response.status === 'success') {
                    // Thành công
                    Swal.fire({
                        icon: 'success',
                        title: 'Đã thêm vào giỏ hàng!',
                        text: response.message, // Lấy message: "Đã thêm vào giỏ hàng!"
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000
                    });

                    // Cập nhật số lượng giỏ hàng trên Header (nếu có element)
                    updateCartCount(response.totalItems);
                }
            },
            error: function(xhr) {
                // Lỗi kết nối hoặc lỗi Server (500)
                btn.prop('disabled', false).html('<i class="fa-solid fa-cart-plus"></i> Thêm vào giỏ');
                Swal.fire('Lỗi Hệ thống', 'Không thể kết nối đến máy chủ. Vui lòng thử lại.', 'error');
                console.error(xhr.responseText);
            }
        });
    }

    // Hàm cảnh báo đăng nhập tách biệt để tái sử dụng
    function showAuthRequiredAlert() {
        Swal.fire({
            icon: 'warning',
            title: 'Bạn chưa đăng nhập!',
            text: 'Vui lòng đăng nhập để thêm vào giỏ hàng.',
            showCancelButton: true,
            confirmButtonText: 'Đăng nhập ngay',
            cancelButtonText: 'Hủy',
            customClass: {
                title: 'text-red-500',
                confirmButton: 'bg-[#FF9900] text-white px-4 py-2 rounded font-bold hover:bg-orange-600',
            }
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = '/login';
            }
        });
    }

    function updateCartCount(count) {
        const cartCountElement = document.getElementById('cart-count-badge');
        if (cartCountElement) {
            cartCountElement.textContent = count;
            // Hiển thị nếu count > 0
            cartCountElement.style.display = count > 0 ? 'inline-flex' : 'none';
        }
    }

    document.getElementById('pageSearchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            searchInPage();
        }
    });
</script>
</body>
</html>
